ready'?'NEON SLICE':'GAME OVER',W/2,H/2-22);g.font='700 18px Arial';g.fillText('드래그해서 큐브를 베고 폭탄은 피하세요',W/2,H/2+22);g.fillText('터치 또는 ENTER로 시작',W/2,H/2+52);g.textAlign='left'}}loop();`);

const galaxyMinerGame = wrapGame('갤럭시 마이너', `<div class="ui" id="ui"></div><canvas id="c"></canvas><div class="help">조작법: ← → / A D / 하단 버튼 이동 · 보석은 먹고 운석은 피하세요.</div><button class="btn left" id="L">←</button><button class="btn right" id="R">→</button>`, `
const c=document.getElementById('c'),g=c.getContext('2d'),ui=document.getElementById('ui');let W,H,D;function size(){D=devicePixelRatio||1;W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;g.setTransform(D,0,0,D,0,0)}addEventListener('resize',size);size();let ship,rocks=[],gems=[],shots=[],keys={},lt=false,rt=false,score=0,best=Number(localStorage.minerBest||0),life=4,state='ready',t=0,spawn=0,gemT=0,fire=0;function beep(f=500,d=.06){try{let A=beep.a||(beep.a=new (AudioContext||webkitAudioContext)()),o=A.createOscillator(),v=A.createGain();o.frequency.value=f;o.type='square';v.gain.value=.055;o.connect(v);v.connect(A.destination);o.start();v.gain.exponentialRampToValueAtTime(.001,A.currentTime+d);o.stop(A.currentTime+d+.02)}catch(e){}}function reset(){ship={x:W/2,y:H-92,w:42,h:44};rocks=[];gems=[];shots=[];score=0;life=4;t=0;spawn=.4;gemT=.6;fire=0;state='play'}addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.code==='Enter'||e.code==='Space'){if(state!=='play')reset();else shots.push({x:ship.x,y:ship.y-26,vy:-10})}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);L.onpointerdown=e=>{lt=true;if(state!=='play')reset();e.stopPropagation()};L.onpointerup=()=>lt=false;L.onpointercancel=()=>lt=false;R.onpointerdown=e=>{rt=true;if(state!=='play')reset();e.stopPropagation()};R.onpointerup=()=>rt=false;R.onpointercancel=()=>rt=false;addEventListener('pointerdown',e=>{if(e.target.tagName!=='BUTTON'){if(state!=='play')reset();else shots.push({x:ship.x,y:ship.y-26,vy:-10})}});function addRock(){let r=18+Math.random()*24;rocks.push({x:30+Math.random()*(W-60),y:-50,r,vy:2.0+Math.random()*2+score/2500,vx:(Math.random()-.5)*1.8,hp:r>34?2:1})}function addGem(){gems.push({x:28+Math.random()*(W-56),y:-30,r:11,vy:2.4+score/4200})}function loop(){requestAnimationFrame(loop);g.clearRect(0,0,W,H);let bg=g.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#020617');bg.addColorStop(.55,'#111827');bg.addColorStop(1,'#312e81');g.fillStyle=bg;g.fillRect(0,0,W,H);for(let i=0;i<95;i++){g.globalAlpha=.25;g.fillStyle=i%4?'#cbd5e1':'#38bdf8';g.fillRect((i*67+t*.8)%W,(i*91+t*1.6)%H,2,2)}g.globalAlpha=1;if(state==='play'){t++;score+=.12;spawn-=.016;gemT-=.016;fire-=.016;let dir=(keys.arrowright||keys.d||rt?1:0)-(keys.arrowleft||keys.a||lt?1:0);ship.x+=dir*7.5;ship.x=Math.max(28,Math.min(W-28,ship.x));if(fire<=0){fire=.33;shots.push({x:ship.x,y:ship.y-26,vy:-11});beep(640,.035)}if(spawn<=0){spawn=Math.max(.22,.68-score/6000);addRock();if(score>900&&Math.random()<.28)addRock()}if(gemT<=0){gemT=.95+Math.random()*.7;addGem()}for(const r of rocks){r.y+=r.vy;r.x+=r.vx;if(r.x<r.r||r.x>W-r.r)r.vx*=-1;if(r.y>H+80)r.dead=true;if(Math.abs(ship.x-r.x)<ship.w/2+r.r-5&&Math.abs(ship.y-r.y)<ship.h/2+r.r-6){r.dead=true;life--;beep(130);if(life<=0){state='over';best=Math.max(best,Math.floor(score));localStorage.minerBest=best}}}for(const s of shots){s.y+=s.vy;for(const r of rocks){if(!r.dead&&(s.x-r.x)**2+(s.y-r.y)**2<(r.r+5)**2){s.dead=true;r.hp--;if(r.hp<=0){r.dead=true;score+=80+r.r;beep(860)}}}}for(let i=gems.length-1;i>=0;i--){let m=gems[i];m.y+=m.vy;if((ship.x-m.x)**2+(ship.y-m.y)**2<(ship.w/2+m.r)**2){score+=160;gems.splice(i,1);beep(980)}else if(m.y>H+40)gems.splice(i,1)}rocks=rocks.filter(r=>!r.dead);shots=shots.filter(s=>!s.dead&&s.y>-20)}for(const m of gems){g.shadowBlur=18;g.shadowColor='#facc15';g.fillStyle='#facc15';g.beginPath();g.moveTo(m.x,m.y-m.r);g.lineTo(m.x+m.r,m.y);g.lineTo(m.x,m.y+m.r);g.lineTo(m.x-m.r,m.y);g.closePath();g.fill();g.shadowBlur=0}for(const r of rocks){g.fillStyle=r.hp>1?'#a855f7':'#64748b';g.strokeStyle='#cbd5e1';g.lineWidth=2;g.beginPath();g.arc(r.x,r.y,r.r,0,7);g.fill();g.stroke();g.fillStyle='rgba(255,255,255,.35)';g.beginPath();g.arc(r.x-r.r*.25,r.y-r.r*.2,r.r*.18,0,7);g.fill()}for(const s of shots){g.shadowBlur=12;g.shadowColor='#38bdf8';g.fillStyle='#38bdf8';g.fillRect(s.x-3,s.y-10,6,18);g.shadowBlur=0}if(ship){g.save();g.translate(ship.x,ship.y);g.shadowBlur=20;g.shadowColor='#38bdf8';g.fillStyle='#38bdf8';g.beginPath();g.moveTo(0,-28);g.lineTo(23,22);g.lineTo(0,12);g.lineTo(-23,22);g.closePath();g.fill();g.fillStyle='#e0f2fe';g.fillRect(-8,-8,16,12);g.restore();g.shadowBlur=0}ui.textContent='점수 '+Math.floor(score)+' / 최고 '+best+' / 생명 '+life+' / 운석 '+rocks.length;if(state!=='play'){g.fillStyle='rgba(0,0,0,.62)';g.fillRect(0,0,W,H);g.textAlign='center';g.fillStyle='white';g.font='900 42px Arial';g.fillText(state==='ready'?'GALAXY MINER':'MISSION FAILED',W/2,H/2-22);g.font='700 18px Arial';g.fillText('보석은 먹고 운석은 피하거나 자동 레이저로 파괴',W/2,H/2+22);g.fillText('터치 또는 ENTER로 시작',W/2,H/2+52);g.textAlign='left'}}loop();`);

const cardGame = wrapGame('카드 매칭', `<div style="display:grid;place-items:center;height:100%;background:linear-gradient(135deg,#111827,#1e3a8a)"><div style="width:min(94vw,520px)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:900"><div>🧠 카드 매칭<br><span id="info">시작</span></div><button onclick="newGame()" style="border:0;border-radius:12px;padding:10px 14px;background:#38bdf8;color:#06223a;font-weight:900">새게임</button></div><div id="board" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px"></div><div style="margin-top:12px;color:#cbd5e1;font-size:13px;line-height:1.5">조작법: 카드 2개를 눌러 같은 그림을 맞추세요.</div></div></div>`, `
const icons=['🚀','⚡','🔥','💎','🌙','🍀','🎯','🛡️'];let arr=[],open=[],done=0,move=0,lock=false;const board=document.getElementById('board'),info=document.getElementById('info');function newGame(){arr=[...icons,...icons].sort(()=>Math.random()-.5).map(v=>({v,open:false,done:false}));open=[];done=0;move=0;lock=false;draw()}function draw(){info.textContent='이동 '+move+' / 맞춘 카드 '+done+'/8';board.innerHTML=arr.map((c,i)=>'<div onclick="tap('+i+')" style="aspect-ratio:1;border-radius:18px;border:1px solid rgba(255,255,255,.14);background:'+(c.done?'#22c55e':c.open?'#38bdf8':'rgba(255,255,255,.1)')+';color:'+(c.done||c.open?'#06223a':'white')+';display:grid;place-items:center;font-size:34px;font-weight:1000;cursor:pointer;box-shadow:0 12px 25px rgba(0,0,0,.18)">'+(c.open||c.done?c.v:'?')+'</div>').join('')}function tap(i){if(lock||arr[i].open||arr[i].done)return;arr[i].open=true;open.push(i);if(open.length===2){move++;let[a,b]=open;if(arr[a].v===arr[b].v){arr[a].done=arr[b].done=true;done++;open=[]}else{lock=true;setTimeout(()=>{arr[a].open=arr[b].open=false;open=[];lock=false;draw()},650)}}draw()}newGame();`);

const games=[
{title:'비행기 슈팅',category:'슈팅',icon:'✈️',rating:'5.0',desc:'사용자가 준 1P/2P 보스 2만점 고급 비행기 슈팅.',url:'inline:plane',bg:'linear-gradient(135deg,#0ea5e9,#1e1b4b)'},
{title:'스피드 로드 EASY',category:'레이싱',icon:'🏎️',rating:'4.9',desc:'쉬움 패치: 속도와 충돌 판정을 낮추고 코인/방패를 추가.',url:'inline:racing',bg:'linear-gradient(135deg,#f97316,#7c2d12)'},
{title:'네온 브레이커',category:'아케이드',icon:'💎',rating:'4.9',desc:'네온 블록을 깨는 고속 브레이커 게임.',url:'inline:breaker',bg:'linear-gradient(135deg,#06b6d4,#7c3aed)'},
{title:'네온 슬라이스',category:'액션',icon:'⚔️',rating:'4.9',desc:'드래그로 네온 큐브를 베고 폭탄을 피하는 슬라이스 액션.',url:'inline:slice',bg:'linear-gradient(135deg,#22d3ee,#7c3aed)'},
{title:'갤럭시 마이너',category:'슈팅',icon:'💠',rating:'4.9',desc:'우주 보석을 모으고 운석을 자동 레이저로 파괴하는 슈팅 게임.',url:'inline:miner',bg:'linear-gradient(135deg,#2563eb,#312e81)'},
{title:'카드 매칭',category:'퍼즐',icon:'🧠',rating:'4.7',desc:'같은 그림 2장을 맞추는 쉬운 퍼즐 게임.',url:'inline:card',bg:'linear-gradient(135deg,#a855f7,#2563eb)'}];
const tabs=['전체',...new Set(games.map(g=>g.category))];let currentCategory='전체';const tabsEl=document.getElementById('tabs'),gridEl=document.getElementById('gameGrid'),searchInput=document.getElementById('searchInput'),sectionTitle=document.getElementById('sectionTitle'),player=document.getElementById('player'),frame=document.getElementById('gameFrame'),playerTitle=document.getElementById('playerTitle');function esc(s){return String(s).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function renderTabs(){tabsEl.innerHTML=tabs.map(tab=>`<button class="${tab===currentCategory?'active':''}" onclick="selectCategory('${tab}')">${tab}</button>`).join('')}function selectCategory(c){currentCategory=c;renderTabs();renderGames()}function renderGames(){const q=searchInput.value.trim().toLowerCase();const list=games.filter(g=>(currentCategory==='전체'||g.category===currentCategory)&&(!q||g.title.toLowerCase().includes(q)||g.category.toLowerCase().includes(q)||g.desc.toLowerCase().includes(q)));sectionTitle.textContent=currentCategory==='전체'?'전체 게임':currentCategory+' 게임';gridEl.innerHTML=list.map(g=>`<article class="card" onclick="openGame('${esc(g.title)}','${esc(g.url)}')"><div class="thumb" style="--bg:${g.bg}"><div class="badge">${g.category}</div><div class="thumbIcon">${g.icon}</div></div><div class="cardBody"><div class="gameTitle">${g.title}</div><div class="gameDesc">${g.desc}</div><div class="gameMeta"><span class="tag">★ ${g.rating}</span><span class="playMini">PLAY</span></div></div></article>`).join('')||'<div style="color:#94a3b8;padding:30px">검색 결과가 없습니다.</div>'}function openGame(title,url){playerTitle.textContent=title;player.classList.add('active');frame.src='about:blank';frame.removeAttribute('srcdoc');if(url==='inline:plane')frame.srcdoc=planeGame;else if(url==='inline:racing')frame.srcdoc=racingGame;else if(url==='inline:breaker')frame.srcdoc=breakerGame;else if(url==='inline:slice')frame.srcdoc=neonSliceGame;else if(url==='inline:miner')frame.srcdoc=galaxyMinerGame;else if(url==='inline:card')frame.srcdoc=cardGame}function closeGame(){player.classList.remove('active');frame.src='about:blank';frame.removeAttribute('srcdoc')}function reloadGame(){const g=games.find(v=>v.title===playerTitle.textContent);if(g)openGame(g.title,g.url)}searchInput.addEventListener('input',renderGames);renderTabs();renderGames();
</script>
