<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:Arial,'Malgun Gothic',sans-serif;background:#070a14;color:#e8eeff;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(circle at 15% 12%,rgba(56,189,248,.35),transparent 28%),radial-gradient(circle at 85% 10%,rgba(168,85,247,.28),transparent 32%),linear-gradient(180deg,#0b1024,#070a14 60%,#04050b)}header{position:sticky;top:0;z-index:20;background:rgba(7,10,20,.84);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,.08)}.top{max-width:1180px;margin:0 auto;padding:14px 16px;display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}.logo{font-size:25px;font-weight:1000;letter-spacing:-1px}.logo span{color:#38bdf8}.searchBox{flex:1;min-width:220px;max-width:460px}.searchBox input{width:100%;padding:13px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.13);outline:none;background:rgba(255,255,255,.08);color:#fff;font-size:15px}.hero{max-width:1180px;margin:0 auto;padding:28px 16px 12px}.heroBox{border-radius:30px;padding:32px;background:linear-gradient(135deg,rgba(30,41,59,.96),rgba(15,23,42,.9));border:1px solid rgba(255,255,255,.11);box-shadow:0 28px 80px rgba(0,0,0,.4)}.hero h1{margin:0 0 10px;font-size:clamp(34px,6vw,62px);line-height:1.04;letter-spacing:-2px}.hero p{margin:0;color:#cbd5e1;font-size:17px;line-height:1.6;max-width:790px}.wrap{max-width:1180px;margin:0 auto;padding:10px 16px 70px}.tabs{display:flex;gap:10px;overflow-x:auto;padding:12px 0 20px}.tabs button{border:1px solid rgba(255,255,255,.1);white-space:nowrap;color:#dbeafe;background:rgba(255,255,255,.08);padding:10px 15px;border-radius:999px;cursor:pointer;font-weight:900}.tabs button.active{background:#38bdf8;color:#06223a}.sectionTitle{font-size:25px;font-weight:1000;margin:8px 0 5px}.sectionSub{color:#94a3b8;font-size:13px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:17px}.card{overflow:hidden;border-radius:24px;background:rgba(255,255,255,.075);border:1px solid rgba(255,255,255,.1);cursor:pointer;transition:.18s}.card:hover{transform:translateY(-7px);box-shadow:0 24px 50px rgba(0,0,0,.35);border-color:rgba(56,189,248,.35)}.thumb{height:148px;position:relative;display:grid;place-items:center;background:var(--bg)}.thumbIcon{font-size:60px;filter:drop-shadow(0 14px 24px rgba(0,0,0,.35))}.badge{position:absolute;left:11px;top:11px;padding:5px 9px;border-radius:999px;background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.14);font-size:11px;font-weight:900}.cardBody{padding:14px}.gameTitle{font-weight:1000;font-size:17px;color:#fff;margin-bottom:7px}.gameDesc{min-height:38px;color:#cbd5e1;font-size:12px;line-height:1.45;margin-bottom:12px}.gameMeta{display:flex;justify-content:space-between;align-items:center;color:#94a3b8;font-size:12px}.tag{color:#bae6fd;font-weight:900}.playMini{padding:6px 9px;border-radius:999px;background:rgba(56,189,248,.14);color:#e0f2fe;border:1px solid rgba(56,189,248,.25);font-weight:900}.player{position:fixed;inset:0;z-index:100;background:#020617;display:none;flex-direction:column}.player.active{display:flex}.playerBar{min-height:58px;padding:9px 12px;display:flex;gap:10px;align-items:center;background:rgba(15,23,42,.98);border-bottom:1px solid rgba(255,255,255,.08)}.playerBar button{border:0;border-radius:13px;padding:10px 13px;font-weight:1000;cursor:pointer;background:#38bdf8;color:#06223a}.playerBar button.secondary{background:rgba(255,255,255,.1);color:#e8eeff;border:1px solid rgba(255,255,255,.12)}#playerTitle{flex:1;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.gameFrame{flex:1;width:100%;border:0;background:#000}.guide{margin-top:30px;padding:20px;border-radius:22px;background:rgba(255,255,255,.065);border:1px solid rgba(255,255,255,.09);color:#cbd5e1;line-height:1.65}.guide b{color:#fff}.code{font-family:Consolas,monospace;background:rgba(0,0,0,.28);padding:2px 6px;border-radius:6px;color:#bae6fd}@media(max-width:760px){.top{align-items:stretch}.logo{width:100%}.searchBox{max-width:none}.heroBox{padding:24px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.thumb{height:118px}.thumbIcon{font-size:45px}.gameDesc{display:none}.playerBar button{padding:9px 10px}}

.heroBox{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(14,165,233,.28),rgba(168,85,247,.24),rgba(15,23,42,.94));}

<body>
<header><div class="top"><div class="logo">🎮 MY <span>GAME</span> HUB</div><div class="searchBox"><input id="searchInput" placeholder="게임 검색" /></div></div></header>
<section class="hero"><div class="heroBox"><h1>NEON ARCADE<br>GAME HUB</h1><p>화려한 네온 시작화면, 버튼 클릭 사운드, 카드 애니메이션을 추가했습니다. 디펜스 게임은 제거하고 <b>네온 브레이커</b>, <b>네온 슬라이스</b>, <b>갤럭시 마이너</b> 같은 완성도 높은 아케이드 게임으로 교체했습니다.</p></div></section>
<main class="wrap"><div class="tabs" id="tabs"></div><div class="sectionTitle" id="sectionTitle">전체 게임</div><div class="sectionSub">카드를 누르면 전체화면으로 실행됩니다.</div><div class="grid" id="gameGrid"></div><div class="guide"><b>이번 업그레이드판</b><br>디펜스 게임을 빼고 새 아케이드 게임 3개를 추가했습니다. 시작화면은 네온 아케이드 느낌으로 강화했고, 허브의 모든 주요 버튼/카드 클릭에 사운드를 넣었습니다.</div></main>
<section class="player" id="player"><div class="playerBar"><button onclick="closeGame()">← 나가기</button><div id="playerTitle">게임 실행</div><button class="secondary" onclick="reloadGame()">다시 시작</button></div><iframe id="gameFrame" class="gameFrame" title="game player"></iframe></section>
<script>
function wrapGame(title, body, script){return `<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>${title}</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#020617;color:white;font-family:Arial,'Malgun Gothic',sans-serif;touch-action:none}canvas{width:100vw;height:100vh;display:block}.ui{position:fixed;left:12px;top:10px;z-index:5;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.13);border-radius:14px;padding:9px 11px;font-weight:900;line-height:1.45}.help{position:fixed;left:12px;right:12px;bottom:12px;z-index:5;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:9px 12px;text-align:center;color:#dbeafe;font-size:13px}.btn{position:fixed;z-index:6;bottom:22px;width:78px;height:78px;border-radius:50%;border:0;background:#38bdf8;color:#06223a;font-size:24px;font-weight:1000}.left{left:18px}.right{right:18px}.fire{right:18px;bottom:112px;background:#fb7185}.ult{right:108px;bottom:22px;background:#facc15}</style></head><body>${body}<script>${script}<\/script></body></html>`}

function hubBeep(type='click'){
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
    const ac=hubBeep.ac||(hubBeep.ac=new AC());
    if(ac.state==='suspended')ac.resume();
    const o=ac.createOscillator(), g=ac.createGain();
    const now=ac.currentTime;
    o.type=type==='play'?'sawtooth':'square';
    o.frequency.setValueAtTime(type==='play'?220:520,now);
    o.frequency.exponentialRampToValueAtTime(type==='play'?880:760,now+.09);
    g.gain.setValueAtTime(.0001,now); g.gain.exponentialRampToValueAtTime(.12,now+.01); g.gain.exponentialRampToValueAtTime(.0001,now+.12);
    o.connect(g); g.connect(ac.destination); o.start(now); o.stop(now+.14);
  }catch(e){}
}
document.addEventListener('click',e=>{if(e.target.closest('button,.card'))hubBeep(e.target.closest('.card')?'play':'click')},true);

const planeGame = "<!doctype html>\n<html lang=\"ko\">\n<head>\n  <meta charset=\"utf-8\"/>\n  <meta name=\"viewport\" content=\"width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no\"/>\n  <title>비행기 슈팅 - 1P/2P + 보스 2만점 + 업그레이드(메카+네온) + 보스 3패턴 + 궁극기 7초</title>\n  <style>\n    :root{\n      --bg:#070a14; --text:#e8eeff; --accent:#6ee7ff; --danger:#ff4d6d; --good:#44ffb5; --warn:#ffd166;\n    }\n    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}\n    html,body{\n      margin:0;height:100%;overflow:hidden;\n      background:radial-gradient(1200px 800px at 50% 0%, #182255 0%, var(--bg) 55%, #04050b 100%);\n      color:var(--text);\n      font-family:ui-sans-serif,system-ui,-apple-system,\"Noto Sans KR\",Segoe UI,Roboto,Arial;\n    }\n    #wrap{position:fixed; inset:0; display:flex; align-items:center; justify-content:center}\n    canvas{width:100vw; height:100vh; display:block; background:transparent}\n\n    .hud{\n      position:fixed; left:12px; top:12px; z-index:10;\n      background:rgba(15,23,48,.62); border:1px solid rgba(110,231,255,.15);\n      backdrop-filter: blur(8px); padding:10px 12px; border-radius:14px;\n      display:flex; gap:10px; align-items:center; flex-wrap:wrap;\n      box-shadow:0 10px 30px rgba(0,0,0,.35);\n      font-size:13px;\n      max-width:min(980px, calc(100vw - 24px));\n    }\n    .pill{padding:4px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.12); display:inline-flex; gap:6px; align-items:center; white-space:nowrap}\n    .pill.good{border-color:rgba(68,255,181,.25)}\n    .pill.bad{border-color:rgba(255,77,109,.25)}\n    .pill.warn{border-color:rgba(255,209,102,.25)}\n    .hud b{font-weight:900}\n    .mini{opacity:.9; font-size:12px}\n\n    .rightBar{\n      position:fixed; right:12px; top:12px; z-index:12;\n      display:flex; flex-direction:column; gap:8px; align-items:flex-end;\n    }\n    .chip{\n      background:rgba(15,23,48,.62);\n      border:1px solid rgba(255,255,255,.12);\n      border-radius:14px;\n      padding:8px 10px;\n      font-size:12px;\n      backdrop-filter: blur(8px);\n      max-width:min(560px, 84vw);\n      line-height:1.35;\n    }\n    .btns{display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap}\n    button{\n      border:0; cursor:pointer; border-radius:12px; padding:9px 12px;\n      font-weight:900; color:#051020; background:var(--accent);\n      box-shadow:0 10px 30px rgba(110,231,255,.22);\n      user-select:none;\n    }\n    button.secondary{\n      background:rgba(255,255,255,.10); color:var(--text);\n      border:1px solid rgba(255,255,255,.16); box-shadow:none\n    }\n    button.danger{\n      background:rgba(255,77,109,.95); color:#0b1020;\n      box-shadow:0 10px 30px rgba(255,77,109,.18);\n    }\n    button:disabled{opacity:.55; cursor:not-allowed}\n\n    /* ✅ READY 애니메이션 */\n    @keyframes pulseReady{\n      0%{ transform: translateZ(0) scale(1); filter:brightness(1); }\n      50%{ transform: translateZ(0) scale(1.05); filter:brightness(1.35); }\n      100%{ transform: translateZ(0) scale(1); filter:brightness(1); }\n    }\n    button.ready{\n      animation: pulseReady .85s ease-in-out infinite;\n      box-shadow:0 14px 44px rgba(255,209,102,.25), 0 10px 30px rgba(110,231,255,.20);\n    }\n\n    .centerOverlay{\n      position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:20;\n      pointer-events:none;\n    }\n    .card{\n      pointer-events:auto;\n      background:rgba(15,23,48,.80); border:1px solid rgba(110,231,255,.18);\n      border-radius:18px; padding:18px 18px; width:min(1040px, 94vw);\n      box-shadow:0 18px 60px rgba(0,0,0,.55);\n      text-align:center;\n      backdrop-filter: blur(10px);\n    }\n    .card h1{margin:0 0 8px; font-size:22px}\n    .card p{margin:8px 0 0; opacity:.92; line-height:1.45}\n    .small{font-size:12px; opacity:.8; margin-top:10px}\n    kbd{\n      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, \"Liberation Mono\", monospace;\n      font-size:12px; padding:2px 6px; border-radius:6px;\n      background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12);\n    }\n\n    .grid{\n      display:grid;\n      grid-template-columns: repeat(4, minmax(0, 1fr));\n      gap:12px;\n      margin-top:14px;\n    }\n    @media (max-width:1020px){ .grid{grid-template-columns:repeat(2,1fr)} }\n    @media (max-width:640px){ .grid{grid-template-columns:1fr} }\n\n    .duoWrap{\n      display:grid;\n      grid-template-columns: 1fr 1fr;\n      gap:12px;\n      margin-top:14px;\n      text-align:left;\n    }\n    @media (max-width:980px){ .duoWrap{grid-template-columns:1fr} }\n    .panel{\n      background:rgba(255,255,255,.06);\n      border:1px solid rgba(255,255,255,.12);\n      border-radius:16px;\n      padding:12px;\n    }\n    .panel .head{\n      display:flex; align-items:center; justify-content:space-between;\n      margin-bottom:10px;\n    }\n    .badge{\n      padding:4px 10px; border-radius:999px;\n      border:1px solid rgba(255,255,255,.14);\n      background:rgba(255,255,255,.06);\n      font-weight:900;\n      font-size:12px;\n      display:inline-flex;\n      gap:8px;\n      align-items:center;\n    }\n    .badge.p1{ border-color:rgba(110,231,255,.40); }\n    .badge.p2{ border-color:rgba(255,209,102,.40); }\n\n    .shipGrid{\n      display:grid;\n      grid-template-columns: repeat(2, minmax(0, 1fr));\n      gap:10px;\n    }\n    @media (max-width:640px){ .shipGrid{grid-template-columns:1fr} }\n\n    .shipCard{\n      text-align:left;\n      border-radius:16px;\n      padding:12px 12px;\n      background:rgba(255,255,255,.06);\n      border:1px solid rgba(255,255,255,.10);\n      cursor:pointer;\n      transition: transform .12s ease, border-color .12s ease, background .12s ease;\n      user-select:none;\n    }\n    .shipCard:hover{ transform: translateY(-2px); border-color: rgba(110,231,255,.28);}\n    .shipCard.activeP1{\n      background:rgba(110,231,255,.10);\n      border-color: rgba(110,231,255,.55);\n      box-shadow:0 14px 40px rgba(110,231,255,.12);\n    }\n    .shipCard.activeP2{\n      background:rgba(255,209,102,.10);\n      border-color: rgba(255,209,102,.55);\n      box-shadow:0 14px 40px rgba(255,209,102,.12);\n    }\n    .shipTop{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px;}\n    .shipName{font-weight:900; font-size:14px}\n    .tag{\n      font-size:11px; padding:2px 8px; border-radius:999px;\n      border:1px solid rgba(255,255,255,.14);\n      opacity:.95;\n    }\n    .bar{height:8px; border-radius:999px; background:rgba(255,255,255,.10); overflow:hidden; margin:6px 0 10px;}\n    .bar > i{display:block; height:100%; background:rgba(110,231,255,.75); width:50%;}\n    .desc{font-size:12px; opacity:.9; line-height:1.35}\n    .meta{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; font-size:12px; opacity:.9}\n    .dot{display:inline-flex; gap:6px; align-items:center}\n    .dot::before{content:\"\"; width:6px; height:6px; border-radius:50%; background:rgba(110,231,255,.75); display:inline-block;}\n\n    .row{display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:14px}\n\n    .bossbar{\n      position:fixed; left:50%; top:12px; transform:translateX(-50%);\n      z-index:11; width:min(560px, 78vw);\n      background:rgba(15,23,48,.62); border:1px solid rgba(255,77,109,.25);\n      backdrop-filter: blur(8px); padding:10px 12px; border-radius:14px;\n      box-shadow:0 10px 30px rgba(0,0,0,.35);\n      display:none;\n    }\n    .bossbar .t{display:flex; justify-content:space-between; align-items:center; font-size:12px; opacity:.92}\n    .bossbar .g{margin-top:8px; height:10px; border-radius:999px; background:rgba(255,255,255,.10); overflow:hidden}\n    .bossbar .g > i{display:block; height:100%; background:rgba(255,77,109,.85); width:50%}\n\n    .toast{\n      position:fixed; left:50%; top:82px; transform:translateX(-50%);\n      z-index:30;\n      background:rgba(255,77,109,.12);\n      border:1px solid rgba(255,77,109,.35);\n      backdrop-filter: blur(8px);\n      padding:10px 14px;\n      border-radius:999px;\n      font-weight:900;\n      display:none;\n      box-shadow:0 12px 40px rgba(0,0,0,.35);\n    }\n\n    .modeRow{\n      display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:12px;\n    }\n    .modeBtn{\n      padding:12px 14px; border-radius:16px;\n      background:rgba(255,255,255,.08);\n      border:1px solid rgba(255,255,255,.14);\n      color:var(--text);\n      box-shadow:none;\n      min-width: 220px;\n      text-align:left;\n    }\n    .modeBtn b{display:block; font-size:14px}\n    .modeBtn span{display:block; margin-top:6px; opacity:.9; font-size:12px; line-height:1.35}\n    .modeBtn.active{\n      background:rgba(110,231,255,.12);\n      border-color: rgba(110,231,255,.45);\n      box-shadow:0 14px 40px rgba(110,231,255,.12);\n    }\n  </style>\n</head>\n<body>\n  <div class=\"hud\">\n    <span class=\"pill good\">점수 <b id=\"score\">0</b></span>\n    <span class=\"pill\">최고 <b id=\"best\">0</b></span>\n\n    <span class=\"pill bad\">P1 목숨 <b id=\"lives1\">3</b></span>\n    <span class=\"pill warn\">P1 HYPER <b id=\"hyper1\">0%</b></span>\n    <span class=\"pill\">P1 기체 <b id=\"ship1Label\">-</b></span>\n    <span class=\"pill\">P1 파워 <b id=\"power1\">-</b></span>\n    <span class=\"pill\">P1 티어 <b id=\"tier1\">0</b></span>\n\n    <span class=\"pill bad\">P2 목숨 <b id=\"lives2\">-</b></span>\n    <span class=\"pill warn\">P2 HYPER <b id=\"hyper2\">-</b></span>\n    <span class=\"pill\">P2 기체 <b id=\"ship2Label\">-</b></span>\n    <span class=\"pill\">P2 파워 <b id=\"power2\">-</b></span>\n    <span class=\"pill\">P2 티어 <b id=\"tier2\">-</b></span>\n\n    <span class=\"pill\">레벨 <b id=\"level\">1</b></span>\n    <span class=\"mini\" id=\"modeHint\"></span>\n  </div>\n\n  <div class=\"bossbar\" id=\"bossbar\">\n    <div class=\"t\"><span><b>⚠ BOSS</b> <span id=\"bossname\">TYRANT</span></span><span>HP <b id=\"bosshp\">0</b>/<b id=\"bossmax\">0</b></span></div>\n    <div class=\"g\"><i id=\"bosshpfill\" style=\"width:50%\"></i></div>\n  </div>\n  <div class=\"toast\" id=\"toast\">⚠ 보스 등장!</div>\n\n  <div class=\"rightBar\">\n    <div class=\"chip\" id=\"hint\">\n      <div><b>P1(키보드)</b> 이동 <kbd>WASD</kbd>/<kbd>방향키</kbd> 발사 <kbd>Space</kbd> 궁극기 <kbd>X</kbd></div>\n      <div style=\"margin-top:6px\"><b>P2(마우스/PC만)</b> 이동: 마우스 위치 / 발사: <kbd>좌클릭(누름)</kbd> / 궁극기: <kbd>우클릭</kbd></div>\n      <div style=\"margin-top:6px; opacity:.9\">아이템: <b>15초에 1번</b>(쿨다운 끝난 뒤 “다음 킬”에서 드랍)</div>\n      <div style=\"margin-top:6px; opacity:.9\">※ 적을 놓쳐도 <b>피 안 닳음</b></div>\n      <div style=\"margin-top:6px; opacity:.9\">※ <b>20000점마다 보스</b> 등장 (보스 중에는 다른 적 출현 X)</div>\n      <div style=\"margin-top:6px; opacity:.9\">※ 보스 처치 시 <b>기체 업그레이드(메카+네온)</b> 진화!</div>\n      <div style=\"margin-top:6px; opacity:.9\">※ <b>모든 기체 궁극기 지속시간 7초</b></div>\n      <div style=\"margin-top:6px; opacity:.9\">※ <b>GEARWIND</b>: 상시 톱니 3개 오빗 / 궁극기: 톱니 <b>3배</b> × <b>7초</b>(너프/버프 혼합)</div>\n    </div>\n    <div class=\"btns\">\n      <button class=\"secondary\" id=\"pauseBtn\">일시정지</button>\n      <button class=\"secondary\" id=\"muteBtn\">사운드 ON</button>\n      <button class=\"danger\" id=\"hyperBtn1\">P1 HYPER</button>\n      <button class=\"danger\" id=\"hyperBtn2\">P2 HYPER</button>\n    </div>\n  </div>\n\n  <div id=\"wrap\"><canvas id=\"c\"></canvas></div>\n\n  <div class=\"centerOverlay\" id=\"overlay\">\n    <div class=\"card\">\n      <h1 id=\"overlayTitle\">플레이 모드 선택</h1>\n      <p id=\"overlayDesc\">1인 또는 2인을 고른 뒤, 기체를 선택하고 시작해!</p>\n\n      <div class=\"modeRow\" id=\"modeRow\">\n        <button class=\"modeBtn\" id=\"mode1Btn\" type=\"button\">\n          <b>1인 플레이</b>\n          <span>PC/모바일 모두 가능<br/>조작: 키보드(PC) 또는 드래그(모바일)</span>\n        </button>\n        <button class=\"modeBtn\" id=\"mode2Btn\" type=\"button\">\n          <b>2인 플레이 (PC만)</b>\n          <span>P1: 키보드 / P2: 마우스<br/>각자 다른 기체 선택 가능</span>\n        </button>\n      </div>\n\n      <div id=\"soloPick\" style=\"display:none\">\n        <div class=\"grid\" id=\"soloGrid\"></div>\n      </div>\n\n      <div id=\"duoPick\" style=\"display:none\">\n        <div class=\"duoWrap\">\n          <div class=\"panel\">\n            <div class=\"head\">\n              <span class=\"badge p1\">P1 기체</span>\n              <span style=\"opacity:.85;font-size:12px\">선택: <b id=\"p1Chosen\">-</b></span>\n            </div>\n            <div class=\"shipGrid\" id=\"p1Grid\"></div>\n          </div>\n          <div class=\"panel\">\n            <div class=\"head\">\n              <span class=\"badge p2\">P2 기체</span>\n              <span style=\"opacity:.85;font-size:12px\">선택: <b id=\"p2Chosen\">-</b></span>\n            </div>\n            <div class=\"shipGrid\" id=\"p2Grid\"></div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"row\" id=\"diffRow\" style=\"display:none\">\n        <label style=\"display:flex; gap:8px; align-items:center; font-size:13px; opacity:.95\">\n          난이도\n          <select id=\"diff\" style=\"background:rgba(255,255,255,.10);color:var(--text);border:1px solid rgba(255,255,255,.16);border-radius:10px;padding:8px 10px;outline:none;\">\n            <option value=\"easy\">쉬움</option>\n            <option value=\"normal\" selected>보통</option>\n            <option value=\"hard\">어려움</option>\n          </select>\n        </label>\n      </div>\n\n      <div class=\"row\" id=\"actionRow\" style=\"display:none\">\n        <button id=\"startBtn\">시작</button>\n        <button class=\"secondary\" id=\"backBtn\">뒤로</button>\n        <button class=\"secondary\" id=\"howBtn\">조작 숨김/보기</button>\n      </div>\n      <div class=\"small\" id=\"footerSmall\">모바일은 1인만 추천 / PC는 1인·2인 모두 가능</div>\n    </div>\n  </div>\n\n<script>\n(() => {\n  // ===== Canvas =====\n  const canvas = document.getElementById('c');\n  const ctx = canvas.getContext('2d', { alpha:true });\n  function rrRect(x,y,w,h,r){\n    r = Math.max(0, Math.min(r, Math.min(w,h)/2));\n    ctx.beginPath();\n    ctx.moveTo(x+r, y);\n    ctx.arcTo(x+w, y, x+w, y+h, r);\n    ctx.arcTo(x+w, y+h, x, y+h, r);\n    ctx.arcTo(x, y+h, x, y, r);\n    ctx.arcTo(x, y, x+w, y, r);\n    ctx.closePath();\n  }\n  function resize(){\n    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));\n    canvas.width = Math.floor(innerWidth * dpr);\n    canvas.height = Math.floor(innerHeight * dpr);\n    canvas.style.width = innerWidth + 'px';\n    canvas.style.height = innerHeight + 'px';\n    ctx.setTransform(dpr,0,0,dpr,0,0);\n  }\n  addEventListener('resize', resize, {passive:true});\n  resize();\n\n  // ===== UI =====\n  const elScore = document.getElementById('score');\n  const elBest  = document.getElementById('best');\n  const elLives1 = document.getElementById('lives1');\n  const elLives2 = document.getElementById('lives2');\n  const elHyper1 = document.getElementById('hyper1');\n  const elHyper2 = document.getElementById('hyper2');\n  const elLevel = document.getElementById('level');\n  const elShip1 = document.getElementById('ship1Label');\n  const elShip2 = document.getElementById('ship2Label');\n  const elPower1 = document.getElementById('power1');\n  const elPower2 = document.getElementById('power2');\n  const elTier1 = document.getElementById('tier1');\n  const elTier2 = document.getElementById('tier2');\n  const modeHint = document.getElementById('modeHint');\n\n  const overlay  = document.getElementById('overlay');\n  const overlayTitle = document.getElementById('overlayTitle');\n  const overlayDesc = document.getElementById('overlayDesc');\n\n  const modeRow = document.getElementById('modeRow');\n  const mode1Btn = document.getElementById('mode1Btn');\n  const mode2Btn = document.getElementById('mode2Btn');\n\n  const soloPick = document.getElementById('soloPick');\n  const duoPick = document.getElementById('duoPick');\n  const soloGrid = document.getElementById('soloGrid');\n  const p1Grid = document.getElementById('p1Grid');\n  const p2Grid = document.getElementById('p2Grid');\n  const p1Chosen = document.getElementById('p1Chosen');\n  const p2Chosen = document.getElementById('p2Chosen');\n\n  const diffRow = document.getElementById('diffRow');\n  const diffSel = document.getElementById('diff');\n\n  const actionRow = document.getElementById('actionRow');\n  const startBtn = document.getElementById('startBtn');\n  const backBtn  = document.getElementById('backBtn');\n  const howBtn   = document.getElementById('howBtn');\n  const hint     = document.getElementById('hint');\n\n  const pauseBtn = document.getElementById('pauseBtn');\n  const muteBtn  = document.getElementById('muteBtn');\n  const hyperBtn1 = document.getElementById('hyperBtn1');\n  const hyperBtn2 = document.getElementById('hyperBtn2');\n\n  const bossbar = document.getElementById('bossbar');\n  const bossname = document.getElementById('bossname');\n  const bosshp = document.getElementById('bosshp');\n  const bossmax = document.getElementById('bossmax');\n  const bosshpfill = document.getElementById('bosshpfill');\n  const toast = document.getElementById('toast');\n\n  // ===== Helpers =====\n  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));\n  const rand  = (a,b) => a + Math.random()*(b-a);\n  const lerp  = (a,b,t) => a + (b-a)*t;\n  const isPC = matchMedia(\"(hover:hover) and (pointer:fine)\").matches;\n  function dist2(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }\n\n  // ===== Audio (간단) =====\n  let audioOK=false, muted=false, AC=null, master=null;\n  function ensureAudio(){\n    if(audioOK) return;\n    AC = new (window.AudioContext||window.webkitAudioContext)();\n    master = AC.createGain();\n    master.gain.value = 0.35;\n    master.connect(AC.destination);\n    audioOK=true;\n  }\n  function setMute(v){\n    muted=v;\n    if(!audioOK) return;\n    master.gain.value = muted ? 0 : 0.35;\n    muteBtn.textContent = muted ? \"사운드 OFF\" : \"사운드 ON\";\n  }\n  function tone(freq, dur=0.06, type=\"sine\", vol=0.09, slideTo=null){\n    if(muted) return;\n    ensureAudio();\n    const t0=AC.currentTime;\n    const o=AC.createOscillator();\n    const g=AC.createGain();\n    o.type=type;\n    o.frequency.setValueAtTime(freq,t0);\n    if(slideTo!=null) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), t0+dur);\n    g.gain.setValueAtTime(vol,t0);\n    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);\n    o.connect(g); g.connect(master);\n    o.start(); o.stop(t0+dur+0.02);\n  }\n  function noiseBurst(dur=0.12, vol=0.10){\n    if(muted) return;\n    ensureAudio();\n    const t0 = AC.currentTime;\n    const n = Math.floor(AC.sampleRate*dur);\n    const buf = AC.createBuffer(1,n,AC.sampleRate);\n    const data = buf.getChannelData(0);\n    for(let i=0;i<n;i++) data[i]=(Math.random()*2-1)*(1-i/n);\n    const src = AC.createBufferSource(); src.buffer=buf;\n    const g=AC.createGain();\n    g.gain.setValueAtTime(vol,t0);\n    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);\n    src.connect(g); g.connect(master);\n    src.start(); src.stop(t0+dur+0.02);\n  }\n  const sfx = {\n    shoot(){ tone(680,0.045,\"square\",0.06,520); },\n    laser(){ tone(880,0.07,\"sawtooth\",0.08,220); },\n    explode(){ noiseBurst(0.14,0.10); tone(180,0.10,\"triangle\",0.07,60); },\n    hit(){ tone(260,0.07,\"square\",0.08,120); },\n    enemyShoot(){ tone(320,0.06,\"square\",0.05,240); },\n    power(){ tone(520,0.08,\"sine\",0.10,1040); tone(1040,0.06,\"sine\",0.08,1560); },\n    warn(){ tone(160,0.10,\"square\",0.07,140); },\n    hyper(){ tone(140,0.12,\"sawtooth\",0.10,60); noiseBurst(0.18,0.09); },\n    boss(){ tone(90,0.18,\"sawtooth\",0.12,40); noiseBurst(0.22,0.10); },\n    mega(){ tone(220,0.16,\"sawtooth\",0.12,80); noiseBurst(0.22,0.10); }\n  };\n\n  // ===== Tuning =====\n  const TUNE = {\n    powerDuration: 9.0,\n    powerDropCooldown: 15.0,\n\n    // ✅ 보스 20000점\n    bossEveryScore: 20000,\n    bossBaseHP: 380,\n    bossHpPerLevel: 80,\n    bossBulletSpeed: 270,\n\n    // 톱니(상시 오빗)\n    gearCount: 3,\n    gearOrbitR: 44,\n    gearSpin: 8.5,\n    gearR: 12,\n    gearDmgBase: 8.0,\n    gearDmgPerLevel: 1.0,\n\n    // ✅ GEARWIND 궁극기 (지속 7초로 통일)\n    gearMegaScale: 3,\n    gearMegaDuration: 7.0,\n    gearMegaDmgMul: 2.2,\n    gearMegaBulletClearMul: 0.65\n  };\n\n  const diff = {\n    easy:   { lives:4, enemyShoot:0.35, enemyBulletSpeed:240, spawnMul:0.95, scoreMul:0.95, bossHpMul:0.90 },\n    normal: { lives:3, enemyShoot:0.55, enemyBulletSpeed:300, spawnMul:1.00, scoreMul:1.00, bossHpMul:1.00 },\n    hard:   { lives:3, enemyShoot:0.85, enemyBulletSpeed:360, spawnMul:1.10, scoreMul:1.10, bossHpMul:1.12 }\n  };\n  let D = diff.normal;\n\n  // ✅ 모든 기체 궁극기 지속시간 7초 통일\n  const HYPER_DURATION_ALL = 7.0;\n\n  // ===== Ships =====\n  const SHIPS = [\n    {\n      id:\"falcon\", name:\"FALCON\", tag:\"초고속 연사\",\n      desc:\"날렵/안정. 궁극기: 오버클럭 탄막(7초).\",\n      stats:{ fire:0.075, dmgMul:0.90, baseMode:\"normal\" },\n      hyper:{ type:\"barrage\", duration:HYPER_DURATION_ALL, dmgMul:1.35, spread:9, fire:0.040 },\n      skin:{ body:\"#a9b7ff\", glow:\"#6ee7ff\", trail:\"#44ffb5\", accent:\"#ffd166\" },\n      bars:{ speed:78, power:55, control:92 }\n    },\n    {\n      id:\"viper\", name:\"VIPER\", tag:\"기본 확산샷\",\n      desc:\"군중 정리. 궁극기: 와이드 스톰(7초).\",\n      stats:{ fire:0.11, dmgMul:0.85, baseMode:\"spread\" },\n      hyper:{ type:\"wide\", duration:HYPER_DURATION_ALL, width:0.22, dpsBase:14, dpsPerLevel:1.8 },\n      skin:{ body:\"#b8ffe4\", glow:\"#44ffb5\", trail:\"#6ee7ff\", accent:\"#ff4d6d\" },\n      bars:{ speed:66, power:50, control:86 }\n    },\n    {\n      id:\"nova\", name:\"NOVA\", tag:\"관통 레이저\",\n      desc:\"묵직한 관통. 궁극기: 타이탄 빔(7초).\",\n      stats:{ fire:0.18, dmgMul:1.20, baseMode:\"laser\" },\n      hyper:{ type:\"beam\", duration:HYPER_DURATION_ALL, beamHalfWidth:72, dpsBase:18, dpsPerLevel:2.2 },\n      skin:{ body:\"#ffe0a9\", glow:\"#ffd166\", trail:\"#ff9db0\", accent:\"#6ee7ff\" },\n      bars:{ speed:58, power:92, control:76 }\n    },\n    {\n      id:\"gearwind\", name:\"GEARWIND\", tag:\"상시 톱니 오빗\",\n      desc:\"항상 톱니 3개가 주변 회전(접촉 데미지). 궁극기: 톱니 3배 × 7초.\",\n      stats:{ fire:0.12, dmgMul:0.95, baseMode:\"normal\", hasGears:true },\n      hyper:{ type:\"gearMega\", duration:HYPER_DURATION_ALL },\n      skin:{ body:\"#d9d9ff\", glow:\"#c4b5fd\", trail:\"#6ee7ff\", accent:\"#44ffb5\" },\n      bars:{ speed:62, power:70, control:82 }\n    },\n  ];\n\n  // ===== Selection State =====\n  const BEST_KEY = \"plane_best_mecha_neon_v2\";\n  let bestScore = Number(localStorage.getItem(BEST_KEY) || 0);\n  elBest.textContent = bestScore;\n\n  let mode = \"1p\";\n  let shipP1 = SHIPS[0];\n  let shipP2 = SHIPS[1];\n\n  // ===== Game =====\n  let running=false, paused=false;\n\n  const state = {\n    score:0, level:1, time:0,\n    spawnTimer:0, spawnEvery:0.9, enemySpeed:160,\n    powerDropCd:0,\n    nextBossAt: TUNE.bossEveryScore,\n    bossActive:false,\n    boss:null,\n    toastT:0,\n\n    // ✅ 보스 예고/큐\n    bossWarnT: 0,\n    bossQueued: false,\n\n    // ✅ 보스 패턴 로테이션\n    bossPatternIdx: 0\n  };\n\n  function makePlayer(id){\n    return {\n      id,\n      ship: SHIPS[0],\n      x: innerWidth*0.5 + (id===2 ? 60 : -60),\n      y: innerHeight*0.78,\n      r: 18,\n      lives: 3,\n      fireEvery: 0.14,\n      cooldown: 0,\n      invuln: 0,\n\n      powerType:null, powerT:0, shield:0,\n      hyper:0, hyperOn:false, hyperT:0,\n      barrageCd:0,\n\n      // 톱니\n      gears: [],\n\n      // 입력\n      wantFire:false,\n      wantHyper:false,\n\n      // ✅ 업그레이드(메카+네온)\n      upgradeTier: 0,\n      upgradeFlash: 0,\n      dmgBonus: 0,\n      upSkin: { glowBoost:0, crownSize:0, neon:0 }\n    };\n  }\n  const P1 = makePlayer(1);\n  const P2 = makePlayer(2);\n\n  let twoPlayer = false;\n\n  const bullets=[];\n  const enemies=[];\n  const eBullets=[];\n  const drops=[];\n\n  // Background\n  const stars = Array.from({length: 170}, () => ({\n    x: Math.random()*innerWidth, y: Math.random()*innerHeight,\n    r: Math.random()*1.6+0.2, v: Math.random()*90+40\n  }));\n\n  function setScore(v){\n    state.score = v;\n    elScore.textContent = state.score;\n    if(state.score > bestScore){\n      bestScore = state.score;\n      localStorage.setItem(BEST_KEY, String(bestScore));\n      elBest.textContent = bestScore;\n    }\n  }\n\n  function uiPlayers(){\n    elLives1.textContent = Math.max(0, P1.lives);\n    elHyper1.textContent = `${Math.floor(P1.hyper)}%`;\n    elShip1.textContent = P1.ship?.name || \"-\";\n    elPower1.textContent = P1.powerType ? `${P1.powerType} ${Math.ceil(P1.powerT)}s` : \"-\";\n    elTier1.textContent = String(P1.upgradeTier||0);\n\n    if(twoPlayer){\n      elLives2.textContent = Math.max(0, P2.lives);\n      elHyper2.textContent = `${Math.floor(P2.hyper)}%`;\n      elShip2.textContent = P2.ship?.name || \"-\";\n      elPower2.textContent = P2.powerType ? `${P2.powerType} ${Math.ceil(P2.powerT)}s` : \"-\";\n      elTier2.textContent = String(P2.upgradeTier||0);\n      modeHint.textContent = \"2P\";\n      hyperBtn2.disabled = false;\n    }else{\n      elLives2.textContent = \"-\";\n      elHyper2.textContent = \"-\";\n      elShip2.textContent = \"-\";\n      elPower2.textContent = \"-\";\n      elTier2.textContent = \"-\";\n      modeHint.textContent = \"1P\";\n      hyperBtn2.disabled = true;\n    }\n    elLevel.textContent = state.level;\n  }\n\n  // ===== 톱니 상시 오빗 =====\n  function activeGearCount(player){\n    // 궁극기 중에는 톱니 크기를 괴상하게 키우지 않고, 개수를 3배로 늘린다.\n    if(player.hyperOn && player.ship?.hyper?.type === \"gearMega\") return TUNE.gearCount * TUNE.gearMegaScale;\n    return TUNE.gearCount;\n  }\n  function ensureGears(player){\n    if(!player.ship?.stats?.hasGears){\n      player.gears.length = 0;\n      return;\n    }\n    const n = activeGearCount(player);\n    if(player.gears.length !== n){\n      player.gears.length = 0;\n      const base = rand(0, Math.PI*2);\n      for(let i=0;i<n;i++){\n        player.gears.push({ ang: base + (i/n)*Math.PI*2 });\n      }\n    }\n  }\n  function gearScale(player){\n    // 3배 크기 대신 약간만 커지게 해서 화면을 가리지 않게 한다.\n    if(player.hyperOn && player.ship?.hyper?.type === \"gearMega\") return 1.25;\n    return 1;\n  }\n  function gearDmgMul(player){\n    if(player.hyperOn && player.ship?.hyper?.type === \"gearMega\") return TUNE.gearMegaDmgMul;\n    return 1;\n  }\n  function updateGears(player, dt){\n    ensureGears(player);\n    if(!player.gears.length) return;\n    for(const g of player.gears) g.ang += TUNE.gearSpin * dt;\n  }\n  function gearWorldPos(player, g){\n    const mega = player.hyperOn && player.ship?.hyper?.type === \"gearMega\";\n    const r = TUNE.gearOrbitR * (mega ? 1.28 : 1);\n    return { x: player.x + Math.cos(g.ang)*r, y: player.y + Math.sin(g.ang)*r };\n  }\n\n  // ===== 업그레이드(메카+네온) =====\n  function showToast(msg, sec=1.2){\n    toast.textContent = msg;\n    toast.style.display = \"block\";\n    state.toastT = sec;\n  }\n\n  function upgradeShip(player){\n    const next = Math.min(3, (player.upgradeTier||0) + 1);\n    if(next === player.upgradeTier) return;\n\n    player.upgradeTier = next;\n    player.upgradeFlash = 1.25;\n\n    const fireMul = [1, 0.94, 0.90, 0.86][next];\n    const dmgAdd  = [0, 0.08, 0.16, 0.25][next];\n\n    player.fireEvery = player.ship.stats.fire * fireMul;\n    player.dmgBonus = dmgAdd;\n\n    // ✅ 기체별 개성 유지 보정(가볍게)\n    if(player.ship.id === \"nova\"){ player.dmgBonus += 0.04 * next; }\n    if(player.ship.id === \"viper\"){ player.fireEvery *= (1 - 0.02 * next); }\n    if(player.ship.id === \"gearwind\"){ player.dmgBonus += 0.02 * next; }\n\n    player.upSkin = {\n      glowBoost: [0, 0.22, 0.40, 0.60][next],\n      crownSize: [0, 1, 2, 3][next],\n      neon:      [0, 1, 1.6, 2.2][next]\n    };\n\n    showToast(`✨ ${player.id===1?'P1':'P2'} 업그레이드 T${next}!`, 1.25);\n    sfx.power();\n  }\n\n  // ===== Powerups =====\n  function maybeDropPower(x,y){\n    if(state.powerDropCd > 0) return;\n    state.powerDropCd = TUNE.powerDropCooldown;\n    const pool=[\"RAPID\",\"SPREAD\",\"LASER\",\"SHIELD\"];\n    drops.push({ x, y, r:14, vy: rand(95,160), type: pool[(Math.random()*pool.length)|0] });\n  }\n  function applyPower(player, type){\n    player.powerType = type;\n    player.powerT = TUNE.powerDuration;\n    if(type===\"SHIELD\") player.shield = 1;\n    sfx.power();\n  }\n  function clearPower(player){\n    player.powerType=null; player.powerT=0; player.shield=0;\n  }\n\n  // ===== Scaling =====\n  function playerDamage(p){\n    const bonus = Math.min(6, Math.floor((state.level-1)/2));\n    return (1 + bonus) * (p.ship.stats.dmgMul + (p.dmgBonus||0));\n  }\n  function laserDamage(p){\n    const bonus = Math.min(8, Math.floor((state.level-1)/2));\n    return (2 + bonus) * (p.ship.stats.dmgMul + (p.dmgBonus||0));\n  }\n  function addHyper(player, amount){\n    player.hyper = clamp(player.hyper + amount, 0, 100);\n  }\n\n  // ===== Enemies =====\n  function spawnEnemy(){\n    const w = rand(26,46);\n    const x = rand(w, innerWidth-w);\n    const y = -rand(60,160);\n    const toughChance = 0.12 + state.level*0.012;\n    const hp = (Math.random() < toughChance) ? 2 : 1;\n    const zig = Math.random() < 0.36 ? rand(1.2,2.7) : 0;\n    const kind = (Math.random() < 0.15) ? \"fast\" : \"normal\";\n    const shooter = Math.random() < clamp(D.enemyShoot + state.level*0.03, 0.25, 0.95);\n\n    enemies.push({\n      x,y,w,h:w*0.9,r:w*0.45,\n      vy: (kind===\"fast\"?rand(1.2,1.5):rand(0.85,1.15))*state.enemySpeed,\n      vx: zig ? rand(-1,1)*rand(80,130) : 0,\n      zig,t:rand(0,10),hp,kind,shooter,shootCd:rand(0.4,1.4)\n    });\n  }\n  function nearestTarget(ex,ey){\n    if(twoPlayer){\n      return (dist2(ex,ey,P1.x,P1.y) <= dist2(ex,ey,P2.x,P2.y)) ? P1 : P2;\n    }\n    return P1;\n  }\n  function enemyFire(e){\n    const base = D.enemyBulletSpeed + state.level*8;\n    const target = nearestTarget(e.x,e.y);\n    const err = 58;\n    const dx = (target.x - e.x) + rand(-err, err);\n    const dy = (target.y - e.y) + rand(-err*0.65, err*0.65);\n    const len = Math.hypot(dx,dy) || 1;\n    const vx = (dx/len) * base * 0.55;\n    const vy = (dy/len) * base * 0.95;\n\n    eBullets.push({ x:e.x, y:e.y+e.r*0.4, r:4, vx, vy, from:\"enemy\", dmg:1 });\n    sfx.enemyShoot();\n  }\n\n  // ===== Boss =====\n  function bossUIUpdate(){\n    if(!state.bossActive || !state.boss){ bossbar.style.display=\"none\"; return; }\n    bossbar.style.display=\"block\";\n    const p = state.boss?.pattern ?? 0;\n    bossname.textContent = (p===0) ? \"TYRANT-FAN\" : (p===1) ? \"TYRANT-WAVE\" : \"TYRANT-RING\";\n\n    bosshp.textContent = Math.max(0, Math.ceil(state.boss.hp));\n    bossmax.textContent = Math.max(1, Math.ceil(state.boss.maxHp));\n    const pct = clamp(state.boss.hp/state.boss.maxHp, 0, 1);\n    bosshpfill.style.width = (pct*100).toFixed(1) + \"%\";\n  }\n\n  function spawnBoss(){\n    state.bossQueued = false;\n    state.bossActive=true;\n\n    enemies.length=0; eBullets.length=0; drops.length=0;\n\n    // ✅ 패턴 로테이션\n    state.bossPatternIdx = (state.bossPatternIdx + 1) % 3;\n\n    const w = Math.min(340, innerWidth*0.64);\n    const h = w*0.40;\n    const maxHp = (TUNE.bossBaseHP + state.level*TUNE.bossHpPerLevel) * D.bossHpMul;\n\n    state.boss = {\n      x: innerWidth*0.5,\n      y: -h*0.8,\n      w,h,r: Math.min(w,h)*0.35,\n      hp:maxHp, maxHp,\n      t:0, shootCd:1.0,\n      pattern: state.bossPatternIdx,\n      phaseT: 0\n    };\n\n    showToast(\"⚠ 보스 등장!\", 1.35);\n    sfx.boss();\n    bossUIUpdate();\n  }\n\n  // ✅ 보스 3패턴\n  function bossFirePattern(b){\n    const spMul = (diffSel.value===\"easy\")?0.92 : (diffSel.value===\"hard\")?1.08 : 1.0;\n    const speed = (TUNE.bossBulletSpeed + state.level*6) * spMul;\n\n    if(b.pattern === 0) return bossPatternFan(b, speed);\n    if(b.pattern === 1) return bossPatternWave(b, speed);\n    return bossPatternRing(b, speed);\n  }\n  function bossPatternFan(b, speed){\n    const hard = (diffSel.value===\"hard\");\n    const easy = (diffSel.value===\"easy\");\n\n    const n = easy ? 7 : hard ? 13 : 9;\n    const spread = easy ? 0.70 : hard ? 1.05 : 0.85;\n\n    for(let i=0;i<n;i++){\n      const t = (i/(n-1))*2-1;\n      const ang = t*spread;\n      const vx = Math.sin(ang)*speed*0.62;\n      const vy = Math.cos(ang)*speed*0.95;\n      eBullets.push({ x:b.x, y:b.y+b.h*0.24, r:4.6, vx, vy, from:\"boss\", dmg:1 });\n    }\n\n    if(!easy && Math.random() < (hard?0.60:0.35)){\n      const target = nearestTarget(b.x,b.y);\n      const err = hard ? 22 : 34;\n      const dx = (target.x - b.x) + rand(-err, err);\n      const dy = (target.y - (b.y+b.h*0.05)) + rand(-err*0.65, err*0.65);\n      const len = Math.hypot(dx,dy)||1;\n      const vx = (dx/len)*speed*0.55;\n      const vy = (dy/len)*speed*0.95;\n\n      eBullets.push({ x:b.x-b.w*0.12, y:b.y+b.h*0.18, r:5.1, vx, vy, from:\"boss\", dmg:1 });\n      eBullets.push({ x:b.x+b.w*0.12, y:b.y+b.h*0.18, r:5.1, vx, vy, from:\"boss\", dmg:1 });\n    }\n\n    sfx.enemyShoot();\n  }\n  function bossPatternWave(b, speed){\n    const hard = (diffSel.value===\"hard\");\n    const easy = (diffSel.value===\"easy\");\n\n    const lanes = easy ? 5 : hard ? 9 : 7;\n    const amp   = easy ? 0.35 : hard ? 0.65 : 0.50;\n\n    for(let i=0;i<lanes;i++){\n      const t = (i/(lanes-1))*2-1;\n      const ang = t*0.55 + Math.sin((state.time*2.0)+i)*amp*0.25;\n      const vx = Math.sin(ang)*speed*0.60;\n      const vy = Math.cos(ang)*speed*0.95;\n      eBullets.push({ x:b.x, y:b.y+b.h*0.24, r:4.4, vx, vy, from:\"boss\", dmg:1 });\n    }\n\n    if(!easy && Math.random() < (hard?0.70:0.45)){\n      const target = nearestTarget(b.x,b.y);\n      const err = hard ? 18 : 28;\n      const dx = (target.x - b.x) + rand(-err, err);\n      const dy = (target.y - (b.y+b.h*0.08)) + rand(-err*0.65, err*0.65);\n      const len = Math.hypot(dx,dy)||1;\n      eBullets.push({\n        x:b.x, y:b.y+b.h*0.18, r:5.2,\n        vx:(dx/len)*speed*0.58, vy:(dy/len)*speed*0.98,\n        from:\"boss\", dmg:1\n      });\n    }\n\n    sfx.enemyShoot();\n  }\n  function bossPatternRing(b, speed){\n    const hard = (diffSel.value===\"hard\");\n    const easy = (diffSel.value===\"easy\");\n\n    const n = easy ? 12 : hard ? 18 : 14;\n    const ringSpeed = speed * (easy ? 0.78 : 0.88);\n\n    for(let i=0;i<n;i++){\n      const ang = (i/n)*Math.PI*2;\n      const vx = Math.cos(ang)*ringSpeed;\n      const vy = Math.sin(ang)*ringSpeed;\n      eBullets.push({ x:b.x, y:b.y+b.h*0.18, r:4.4, vx, vy, from:\"boss\", dmg:1 });\n    }\n\n    if(hard){\n      const n2 = 14;\n      const ringSpeed2 = speed*0.72;\n      for(let i=0;i<n2;i++){\n        const ang = (i/n2)*Math.PI*2 + (Math.PI/n2);\n        const vx = Math.cos(ang)*ringSpeed2;\n        const vy = Math.sin(ang)*ringSpeed2;\n        eBullets.push({ x:b.x, y:b.y+b.h*0.18, r:4.2, vx, vy, from:\"boss\", dmg:1 });\n      }\n    }\n\n    sfx.enemyShoot();\n  }\n\n  function bossUpdate(dt){\n    if(!state.bossActive || !state.boss) return;\n    const b = state.boss;\n    b.t += dt;\n\n    const targetY = innerHeight*0.16;\n    b.y = lerp(b.y, targetY, 0.04);\n    b.x = innerWidth*0.5 + Math.sin(b.t*0.9)*(innerWidth*0.26);\n\n    b.shootCd -= dt;\n    if(b.shootCd <= 0){\n      b.shootCd = clamp(0.56 - state.level*0.01, 0.30, 0.56);\n      bossFirePattern(b);\n    }\n    bossUIUpdate();\n  }\n\n  function endBoss(){\n    for(const p of [P1, ...(twoPlayer?[P2]:[])]){\n      addHyper(p, 50);\n      p.lives = Math.min(5, p.lives + 1);\n      p.invuln = Math.max(p.invuln, 0.8);\n      upgradeShip(p);\n    }\n    for(let i=0;i<3;i++){\n      const pool=[\"RAPID\",\"SPREAD\",\"LASER\",\"SHIELD\"];\n      drops.push({ x: innerWidth*0.5 + rand(-90,90), y: innerHeight*0.18 + rand(-30,30), r:14, vy: rand(75,120), type: pool[(Math.random()*pool.length)|0] });\n    }\n\n    state.bossActive=false;\n    state.boss=null;\n    bossUIUpdate();\n    showToast(\"✅ 보스 처치! 업그레이드!\", 1.25);\n\n    state.nextBossAt += TUNE.bossEveryScore;\n    uiPlayers();\n  }\n\n  // ===== Hyper =====\n  function tryHyper(player){\n    if(player.hyperOn) return;\n    if(player.hyper < 100) return;\n    player.hyper = 0;\n    player.hyperOn = true;\n    player.hyperT = player.ship.hyper.duration; // ✅ 7초\n    player.barrageCd = 0;\n\n    if(player.ship.hyper.type === \"gearMega\") sfx.mega();\n    else sfx.hyper();\n  }\n\n  // ===== Shooting =====\n  function fire(player){\n    if(player.cooldown > 0) return false;\n\n    const baseY = player.y - 26;\n    const p = player.powerType;\n    const ship = player.ship;\n\n    let fireEvery = player.fireEvery || ship.stats.fire;\n    if(p===\"RAPID\") fireEvery = Math.min(fireEvery, 0.075);\n    player.cooldown = fireEvery;\n\n    const dmg = playerDamage(player);\n    const wantLaser = (ship.stats.baseMode===\"laser\") || (p===\"LASER\");\n    const wantSpreadBase = (ship.stats.baseMode===\"spread\") || (p===\"SPREAD\");\n\n    if(wantLaser){\n      bullets.push({ x:player.x, y:baseY, r:5, vy:-560*0.95, vx:0, kind:\"laser\", pierce:true, dmg:laserDamage(player), owner:player.id });\n      sfx.laser();\n      return true;\n    }\n\n    if(wantSpreadBase){\n      const angles = (p===\"SPREAD\") ? [-0.30,-0.16,0,0.16,0.30] : [-0.18,0,0.18];\n      for(const a of angles){\n        bullets.push({ x:player.x, y:baseY, r:3, vy:-560*0.95, vx:Math.sin(a)*260, kind:\"normal\", dmg, owner:player.id });\n      }\n      sfx.shoot();\n      return true;\n    }\n\n    bullets.push({ x:player.x, y:baseY, r:3, vy:-560, vx:0, kind:\"normal\", dmg, owner:player.id });\n    if(state.score >= 600){\n      bullets.push({ x:player.x-10, y:baseY+4, r:3, vy:-560, vx:0, kind:\"normal\", dmg, owner:player.id });\n      bullets.push({ x:player.x+10, y:baseY+4, r:3, vy:-560, vx:0, kind:\"normal\", dmg, owner:player.id });\n    }\n    sfx.shoot();\n    return true;\n  }\n\n  function hyperExtraFire(player, dt){\n    if(!player.hyperOn) return;\n    const ship = player.ship;\n    if(ship.hyper.type !== \"barrage\") return;\n\n    player.barrageCd -= dt;\n    if(player.barrageCd > 0) return;\n    player.barrageCd = ship.hyper.fire;\n\n    const baseY = player.y - 26;\n    const spread = ship.hyper.spread;\n    const half = 0.55;\n    const dmg = playerDamage(player) * ship.hyper.dmgMul;\n\n    for(let i=0;i<spread;i++){\n      const t = (i/(spread-1))*2-1;\n      const a = t*half;\n      bullets.push({ x:player.x, y:baseY, r:3, vy:-560*0.98, vx:Math.sin(a)*340, kind:\"normal\", dmg, owner:player.id });\n    }\n    sfx.shoot();\n  }\n\n  function hyperDamage(player, ex, ey, dt){\n    if(!player.hyperOn) return 0;\n    const ship = player.ship;\n    const ht = ship.hyper.type;\n\n    if(ht === \"beam\"){\n      const b = ship.hyper;\n      if(Math.abs(ex - player.x) <= b.beamHalfWidth && ey < player.y - 24){\n        const dps = b.dpsBase + state.level*b.dpsPerLevel;\n        return dps*dt;\n      }\n      return 0;\n    }\n    if(ht === \"wide\"){\n      const b = ship.hyper;\n      const apexX = player.x;\n      const apexY = player.y - 18;\n      const dx = ex - apexX;\n      const dy = ey - apexY;\n      if(dy > 0) return 0;\n      const ang = Math.atan2(dy, dx);\n      const rel = Math.abs(ang + Math.PI/2);\n      const half = Math.PI * b.width;\n      const dist = Math.hypot(dx,dy);\n      if(rel <= half && dist <= innerHeight*0.88){\n        const dps = b.dpsBase + state.level*b.dpsPerLevel;\n        return dps*dt;\n      }\n      return 0;\n    }\n    if(ht === \"gearMega\") return 0;\n    return 0;\n  }\n\n  // ===== Damage =====\n  function takeDamage(player){\n    if(player.invuln > 0) return;\n\n    if(player.shield){\n      player.shield=0;\n      player.invuln=0.6;\n      sfx.hit();\n      return;\n    }\n    player.lives -= 1;\n    player.invuln=1.0;\n    sfx.explode();\n  }\n\n  // ===== Draw =====\n  function drawStars(dt){\n    for(const s of stars){\n      s.y += s.v*dt;\n      if(s.y > innerHeight+10){ s.y=-10; s.x=Math.random()*innerWidth; s.v=Math.random()*90+40; s.r=Math.random()*1.6+0.2; }\n      ctx.globalAlpha=0.85;\n      ctx.fillStyle=\"#e8eeff\";\n      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();\n    }\n    ctx.globalAlpha=1;\n  }\n\n  // 메카+네온 파츠 그리기(업그레이드)\n  function drawMechaNeonParts(tier, neon, bodyCol){\n    if(tier<=0) return;\n\n    // 네온 라인(외곽선 느낌)\n    ctx.save();\n    ctx.globalAlpha = 0.22 * neon;\n    ctx.strokeStyle = \"#6ee7ff\";\n    ctx.lineWidth = 2 + tier*0.5;\n    ctx.beginPath();\n    ctx.moveTo(0,-24);\n    ctx.lineTo(-22,10);\n    ctx.lineTo(0,8);\n    ctx.lineTo(22,10);\n    ctx.closePath();\n    ctx.stroke();\n    ctx.restore();\n\n    // 메카 윙/엔진\n    ctx.save();\n    ctx.globalAlpha = 0.92;\n    ctx.fillStyle = bodyCol;\n\n    const engY = 10;\n    const engX = 14 + tier*3;\n    rrRect(-engX-6, engY, 12, 16 + tier*2, 6);\n    ctx.fill();\n    rrRect(engX-6, engY, 12, 16 + tier*2, 6);\n    ctx.fill();\n\n    ctx.globalAlpha = 0.88;\n    ctx.fillStyle = \"rgba(255,255,255,0.18)\";\n    ctx.beginPath();\n    ctx.moveTo(-8, -2);\n    ctx.lineTo(-34 - tier*6, 8);\n    ctx.lineTo(-10, 14 + tier*2);\n    ctx.closePath();\n    ctx.fill();\n\n    ctx.beginPath();\n    ctx.moveTo(8, -2);\n    ctx.lineTo(34 + tier*6, 8);\n    ctx.lineTo(10, 14 + tier*2);\n    ctx.closePath();\n    ctx.fill();\n\n    // 네온 엔진 불꽃\n    ctx.globalAlpha = 0.65;\n    ctx.fillStyle = \"#44ffb5\";\n    const flame = 10 + tier*3 + Math.sin(state.time*18)*2;\n    ctx.beginPath();\n    ctx.moveTo(-engX, engY + 20);\n    ctx.lineTo(-engX-4, engY + 20 + flame);\n    ctx.lineTo(-engX+4, engY + 20 + flame);\n    ctx.closePath();\n    ctx.fill();\n\n    ctx.beginPath();\n    ctx.moveTo(engX, engY + 20);\n    ctx.lineTo(engX-4, engY + 20 + flame);\n    ctx.lineTo(engX+4, engY + 20 + flame);\n    ctx.closePath();\n    ctx.fill();\n\n    // ✅ 추가: 상단 핀/측면 아머(더 화려하게)\n    if(tier >= 2){\n      ctx.globalAlpha = 0.92;\n      ctx.fillStyle = \"rgba(255,255,255,0.20)\";\n      ctx.beginPath();\n      ctx.moveTo(0, -26 - tier*2);\n      ctx.lineTo(-6, -10);\n      ctx.lineTo(0, -14);\n      ctx.lineTo(6, -10);\n      ctx.closePath();\n      ctx.fill();\n    }\n    if(tier >= 3){\n      ctx.globalAlpha = 0.88;\n      ctx.fillStyle = \"rgba(255,209,102,0.22)\";\n      rrRect(-28, -2, 10, 22, 8); ctx.fill();\n      rrRect(18, -2, 10, 22, 8); ctx.fill();\n    }\n\n    ctx.restore();\n  }\n\n  function drawShip(player){\n    const ship = player.ship;\n    const sk = ship.skin;\n    const tier = player.upgradeTier||0;\n    const neon = player.upSkin?.neon || 0;\n\n    const blink = player.invuln>0 ? (Math.floor(player.invuln*12)%2===0) : true;\n    if(!blink) return;\n\n    ctx.save();\n    ctx.globalAlpha=0.10 + 0.04*tier;\n    ctx.fillStyle=sk.trail;\n    ctx.beginPath(); ctx.ellipse(player.x, player.y+20, 26 + tier*4, 12 + tier*2, 0, 0, Math.PI*2); ctx.fill();\n    ctx.restore();\n\n    ctx.save();\n    ctx.translate(player.x, player.y);\n\n    if(player.upgradeFlash>0){\n      const t = player.upgradeFlash;\n      ctx.save();\n      ctx.globalAlpha = 0.22 + 0.25*Math.sin((1.25-t)*18);\n      ctx.fillStyle = \"#ffd166\";\n      ctx.beginPath();\n      ctx.arc(0,0, player.r*3.0 + (1.25-t)*20, 0, Math.PI*2);\n      ctx.fill();\n      ctx.restore();\n    }\n\n    if(tier>0){\n      const gb = player.upSkin?.glowBoost || 0.2;\n      ctx.save();\n      ctx.globalAlpha = 0.10 + gb*0.26;\n      ctx.fillStyle = \"#6ee7ff\";\n      ctx.beginPath();\n      ctx.arc(0,0, player.r*2.7 + tier*7 + Math.sin(state.time*8)*2, 0, Math.PI*2);\n      ctx.fill();\n      ctx.restore();\n    }\n\n    if(player.shield){\n      ctx.globalAlpha=0.24;\n      ctx.strokeStyle=sk.glow;\n      ctx.lineWidth=3;\n      ctx.beginPath();\n      ctx.arc(0,0,player.r*1.75 + Math.sin(state.time*8)*1.2, 0, Math.PI*2);\n      ctx.stroke();\n    }\n\n    ctx.globalAlpha=0.18 + 0.04*tier;\n    ctx.fillStyle=sk.glow;\n    ctx.beginPath(); ctx.arc(0,2,player.r*2.1 + tier*3,0,Math.PI*2); ctx.fill();\n\n    drawMechaNeonParts(tier, neon, sk.body);\n\n    ctx.globalAlpha=1;\n    ctx.fillStyle=sk.body;\n\n    if(ship.id===\"falcon\"){\n      ctx.beginPath();\n      ctx.moveTo(0,-24); ctx.lineTo(-18,14); ctx.lineTo(0,10); ctx.lineTo(18,14);\n      ctx.closePath(); ctx.fill();\n      ctx.fillStyle=sk.accent;\n      ctx.beginPath(); ctx.moveTo(-16,-4); ctx.lineTo(-30,10); ctx.lineTo(-8,8); ctx.closePath(); ctx.fill();\n      ctx.beginPath(); ctx.moveTo(16,-4); ctx.lineTo(30,10); ctx.lineTo(8,8); ctx.closePath(); ctx.fill();\n    }else if(ship.id===\"viper\" || ship.id===\"gearwind\"){\n      ctx.beginPath();\n      ctx.moveTo(0,-22); ctx.lineTo(-26,6); ctx.lineTo(-8,16); ctx.lineTo(0,10); ctx.lineTo(8,16); ctx.lineTo(26,6);\n      ctx.closePath(); ctx.fill();\n      ctx.fillStyle=sk.accent;\n      rrRect(-6,-10,12,20,6); ctx.fill();\n    }else{\n      ctx.beginPath();\n      ctx.moveTo(0,-24);\n      ctx.quadraticCurveTo(-14,-12,-10,10);\n      ctx.quadraticCurveTo(0,18,10,10);\n      ctx.quadraticCurveTo(14,-12,0,-24);\n      ctx.closePath(); ctx.fill();\n      ctx.fillStyle=sk.accent;\n      ctx.beginPath(); ctx.arc(0,-14,6,0,Math.PI*2); ctx.fill();\n    }\n\n    ctx.globalAlpha=0.95;\n    ctx.fillStyle=\"#0b1020\";\n    ctx.beginPath(); ctx.ellipse(0,-6,6,10,0,0,Math.PI*2); ctx.fill();\n\n    if(tier>0){\n      ctx.save();\n      ctx.globalAlpha = 0.28 * (0.9 + 0.1*Math.sin(state.time*10));\n      ctx.strokeStyle = \"#44ffb5\";\n      ctx.lineWidth = 1.6 + tier*0.55;\n      ctx.beginPath();\n      ctx.moveTo(0,-24);\n      ctx.lineTo(-18,14);\n      ctx.lineTo(0,10);\n      ctx.lineTo(18,14);\n      ctx.closePath();\n      ctx.stroke();\n      ctx.restore();\n    }\n\n    if(tier>0){\n      const cs = player.upSkin?.crownSize || 1;\n      ctx.save();\n      ctx.globalAlpha = 0.92;\n      ctx.fillStyle = \"#ffd166\";\n      ctx.beginPath();\n      ctx.moveTo(0, -30 - tier*2);\n      ctx.lineTo(-10-cs*2, -18);\n      ctx.lineTo(-2, -20);\n      ctx.lineTo(2, -20);\n      ctx.lineTo(10+cs*2, -18);\n      ctx.closePath();\n      ctx.fill();\n      ctx.restore();\n    }\n\n    ctx.globalAlpha=0.95;\n    ctx.fillStyle=sk.trail;\n    ctx.beginPath();\n    ctx.moveTo(0,22); ctx.lineTo(-4,32); ctx.lineTo(0,28+Math.sin(state.time*18)*2); ctx.lineTo(4,32);\n    ctx.closePath(); ctx.fill();\n\n    ctx.restore();\n    ctx.globalAlpha=1;\n  }\n\n  function drawEnemy(e){\n    ctx.save(); ctx.translate(e.x,e.y);\n    ctx.globalAlpha=0.12; ctx.fillStyle=\"#ff4d6d\";\n    ctx.beginPath(); ctx.arc(0,0,e.r*1.95,0,Math.PI*2); ctx.fill();\n\n    ctx.globalAlpha=1;\n    ctx.fillStyle = (e.kind===\"fast\") ? \"#ff9db0\" : \"#ff7a90\";\n    ctx.beginPath();\n    ctx.moveTo(0,-e.h*0.55); ctx.lineTo(-e.w*0.55,e.h*0.15); ctx.lineTo(0,e.h*0.55); ctx.lineTo(e.w*0.55,e.h*0.15);\n    ctx.closePath(); ctx.fill();\n\n    ctx.globalAlpha=0.9; ctx.fillStyle=\"#0b1020\";\n    rrRect(-e.w*0.10,-e.h*0.10,e.w*0.20,e.h*0.55,6); ctx.fill();\n\n    if(e.shooter){ ctx.fillStyle=\"#ffd166\"; ctx.beginPath(); ctx.arc(0,e.h*0.18,3.4,0,Math.PI*2); ctx.fill(); }\n    if(e.hp>1){ ctx.fillStyle=\"#ffe3ea\"; ctx.beginPath(); ctx.arc(0,-e.h*0.38,3.3,0,Math.PI*2); ctx.fill(); }\n\n    ctx.restore(); ctx.globalAlpha=1;\n  }\n\n  function drawBoss(b){\n    if(!b) return;\n    ctx.save(); ctx.translate(b.x,b.y);\n    ctx.globalAlpha=0.10; ctx.fillStyle=\"#ff4d6d\";\n    ctx.beginPath(); ctx.ellipse(0,0,b.w*0.62,b.h*0.62,0,0,Math.PI*2); ctx.fill();\n\n    ctx.globalAlpha=1; ctx.fillStyle=\"#ff7a90\";\n    rrRect(-b.w*0.50,-b.h*0.24,b.w,b.h*0.48,24); ctx.fill();\n\n    ctx.fillStyle=\"#ff4d6d\";\n    rrRect(-b.w*0.28,-b.h*0.42,b.w*0.56,b.h*0.30,22); ctx.fill();\n\n    ctx.fillStyle=\"#ffd166\";\n    ctx.beginPath(); ctx.moveTo(-b.w*0.50,0); ctx.lineTo(-b.w*0.80,b.h*0.22); ctx.lineTo(-b.w*0.40,b.h*0.22); ctx.closePath(); ctx.fill();\n    ctx.beginPath(); ctx.moveTo(b.w*0.50,0); ctx.lineTo(b.w*0.80,b.h*0.22); ctx.lineTo(b.w*0.40,b.h*0.22); ctx.closePath(); ctx.fill();\n\n    ctx.fillStyle=\"#0b1020\";\n    ctx.beginPath(); ctx.arc(0,-b.h*0.16,b.h*0.10,0,Math.PI*2); ctx.fill();\n    ctx.globalAlpha=0.9; ctx.fillStyle=\"#e8eeff\";\n    ctx.beginPath(); ctx.arc(0,-b.h*0.16,b.h*0.05 + Math.sin(state.time*10)*1.5,0,Math.PI*2); ctx.fill();\n\n    ctx.restore(); ctx.globalAlpha=1;\n  }\n\n  function drawBullet(b){\n    ctx.save(); ctx.translate(b.x,b.y);\n    if(b.kind===\"laser\"){\n      ctx.globalAlpha=0.9; ctx.fillStyle=\"#ffd166\";\n      rrRect(-2,-16,4,32,4); ctx.fill();\n      ctx.globalAlpha=0.25;\n      rrRect(-6,-20,12,40,8); ctx.fill();\n    }else{\n      ctx.globalAlpha=0.95; ctx.fillStyle=\"#6ee7ff\";\n      rrRect(-2,-8,4,16,3); ctx.fill();\n    }\n    ctx.restore(); ctx.globalAlpha=1;\n  }\n\n  function drawEnemyBullet(b){\n    ctx.save(); ctx.translate(b.x,b.y);\n    ctx.globalAlpha=0.92;\n    ctx.fillStyle = (b.from===\"boss\") ? \"#ffd166\" : \"#ff4d6d\";\n    rrRect(-3,-6,6,12,4); ctx.fill();\n    ctx.globalAlpha=0.18;\n    ctx.beginPath(); ctx.arc(0,0,b.r*2.2,0,Math.PI*2); ctx.fill();\n    ctx.restore(); ctx.globalAlpha=1;\n  }\n\n  function drawPowerIcon(type){\n    ctx.save();\n    ctx.fillStyle=\"#0b1020\";\n    ctx.strokeStyle=\"#0b1020\";\n    if(type===\"RAPID\"){\n      ctx.beginPath();\n      ctx.moveTo(-3,-8); ctx.lineTo(6,-8); ctx.lineTo(0,2); ctx.lineTo(6,2);\n      ctx.lineTo(-2,10); ctx.lineTo(1,1); ctx.lineTo(-6,1);\n      ctx.closePath(); ctx.fill();\n    } else if(type===\"SPREAD\"){\n      ctx.lineWidth=2.5;\n      ctx.beginPath();\n      ctx.moveTo(0,8); ctx.lineTo(0,-8);\n      ctx.moveTo(0,0); ctx.lineTo(-7,-6);\n      ctx.moveTo(0,0); ctx.lineTo(7,-6);\n      ctx.stroke();\n    } else if(type===\"LASER\"){\n      rrRect(-2.2,-10,4.4,20,3); ctx.fill();\n      ctx.beginPath(); ctx.arc(0,-11,3,0,Math.PI*2); ctx.fill();\n    } else if(type===\"SHIELD\"){\n      ctx.beginPath();\n      ctx.moveTo(0,-10);\n      ctx.quadraticCurveTo(9,-7,7,2);\n      ctx.quadraticCurveTo(0,12,-7,2);\n      ctx.quadraticCurveTo(-9,-7,0,-10);\n      ctx.closePath(); ctx.fill();\n    }\n    ctx.restore();\n  }\n\n  function drawDrops(){\n    for(const d of drops){\n      ctx.save(); ctx.translate(d.x,d.y);\n      ctx.globalAlpha=0.18; ctx.fillStyle=\"#44ffb5\";\n      ctx.beginPath(); ctx.arc(0,0,d.r*2.1,0,Math.PI*2); ctx.fill();\n\n      ctx.globalAlpha=0.95; ctx.fillStyle=\"#44ffb5\";\n      rrRect(-d.r,-d.r,d.r*2,d.r*2,10); ctx.fill();\n\n      ctx.globalAlpha=0.22; ctx.fillStyle=\"#e8eeff\";\n      rrRect(-d.r*0.72,-d.r*0.72,d.r*1.44,d.r*1.44,8); ctx.fill();\n\n      ctx.globalAlpha=1;\n      drawPowerIcon(d.type);\n      ctx.restore();\n    }\n    ctx.globalAlpha=1;\n  }\n\n  function drawHyperVisual(player){\n    if(!player.hyperOn) return;\n    const ship = player.ship;\n    const ht = ship.hyper.type;\n\n    if(ht===\"beam\"){\n      const b = ship.hyper;\n      const beamX = player.x;\n      const topY = 0;\n      const bottomY = player.y - 24;\n\n      ctx.save();\n      ctx.globalAlpha=0.80; ctx.fillStyle=\"#ffd166\";\n      rrRect(beamX - b.beamHalfWidth*0.42, topY, b.beamHalfWidth*0.84, bottomY, 22);\n      ctx.fill();\n      ctx.globalAlpha=0.24;\n      // 실제 데미지 판정 폭과 시각 효과 폭을 맞춘다.\n      rrRect(beamX - b.beamHalfWidth, topY, b.beamHalfWidth*2, bottomY, 26);\n      ctx.fill();\n      ctx.restore();\n      return;\n    }\n\n    if(ht===\"wide\"){\n      const b = ship.hyper;\n      const apexX = player.x, apexY = player.y-18;\n      const radius = innerHeight*0.80;\n      const half = Math.PI*b.width;\n      ctx.save();\n      ctx.globalAlpha=0.22; ctx.fillStyle=\"#44ffb5\";\n      ctx.beginPath();\n      ctx.moveTo(apexX, apexY);\n      ctx.arc(apexX, apexY, radius, -Math.PI/2 - half, -Math.PI/2 + half);\n      ctx.closePath(); ctx.fill();\n      ctx.restore();\n      return;\n    }\n\n    if(ht===\"gearMega\"){\n      ctx.save();\n      ctx.globalAlpha=0.14;\n      ctx.fillStyle = \"#c4b5fd\";\n      ctx.beginPath();\n      ctx.arc(player.x, player.y, 96 + Math.sin(state.time*8)*6, 0, Math.PI*2);\n      ctx.fill();\n\n      ctx.globalAlpha=0.22;\n      ctx.strokeStyle = \"#ffd166\";\n      ctx.lineWidth = 3;\n      ctx.beginPath();\n      ctx.arc(player.x, player.y, 50 + Math.sin(state.time*10)*4, 0, Math.PI*2);\n      ctx.stroke();\n      ctx.restore();\n      return;\n    }\n  }\n\n  function drawGears(player){\n    if(!player.gears.length) return;\n    const scale = gearScale(player);\n    const rBase = TUNE.gearR * scale;\n\n    ctx.save();\n    for(const g of player.gears){\n      const pos = gearWorldPos(player, g);\n      const a = g.ang;\n\n      ctx.globalAlpha = 0.16;\n      ctx.fillStyle = player.ship.skin.glow;\n      ctx.beginPath(); ctx.arc(pos.x,pos.y,rBase*2.0,0,Math.PI*2); ctx.fill();\n\n      ctx.globalAlpha = 0.95;\n      ctx.fillStyle = \"#e8eeff\";\n      ctx.beginPath();\n      const teeth = 10;\n      for(let i=0;i<teeth*2;i++){\n        const ang = a + (i/(teeth*2))*Math.PI*2;\n        const rr = (i%2===0) ? rBase : rBase*0.72;\n        const x = pos.x + Math.cos(ang)*rr;\n        const y = pos.y + Math.sin(ang)*rr;\n        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);\n      }\n      ctx.closePath(); ctx.fill();\n\n      ctx.globalAlpha = 0.95;\n      ctx.fillStyle = \"#0b1020\";\n      ctx.beginPath(); ctx.arc(pos.x,pos.y,rBase*0.30,0,Math.PI*2); ctx.fill();\n    }\n    ctx.restore();\n    ctx.globalAlpha=1;\n  }\n\n  function pickupDrops(player){\n    for(let i=drops.length-1;i>=0;i--){\n      const d = drops[i];\n      const rr = player.r + d.r*0.9;\n      if(dist2(player.x, player.y, d.x, d.y) <= rr*rr){\n        drops.splice(i,1);\n        applyPower(player, d.type);\n      }\n    }\n  }\n\n  // ===== Input =====\n  const keys = new Set();\n  addEventListener('keydown', (e)=>{\n    if(e.code==='Space') e.preventDefault();\n    keys.add(e.code);\n\n    if(e.code==='KeyP' && running) togglePause();\n    if(e.code==='KeyM') setMute(!muted);\n    if(e.code==='KeyX' && running && !paused) P1.wantHyper = true;\n  }, {passive:false});\n  addEventListener('keyup', (e)=> keys.delete(e.code), {passive:true});\n\n  let mouseX=innerWidth*0.5, mouseY=innerHeight*0.78;\n  let mouseDown=false;\n\n  canvas.addEventListener('mousemove', (e)=>{ mouseX=e.clientX; mouseY=e.clientY; }, {passive:true});\n  canvas.addEventListener('mousedown', (e)=>{\n    if(!running) return;\n    ensureAudio();\n    if(e.button===0) mouseDown=true;\n    if(e.button===2){ P2.wantHyper=true; }\n  });\n  canvas.addEventListener('mouseup', (e)=>{ if(e.button===0) mouseDown=false; });\n  canvas.addEventListener('contextmenu', (e)=> e.preventDefault());\n\n  // Mobile 1P drag\n  let touchActive=false, touchId=null, touchOffset={dx:0,dy:0};\n  canvas.addEventListener('pointerdown', (e)=>{\n    if(!running) return;\n    if(isPC) return;\n    canvas.setPointerCapture?.(e.pointerId);\n    touchActive=true; touchId=e.pointerId;\n    touchOffset.dx = P1.x - e.clientX;\n    touchOffset.dy = P1.y - e.clientY;\n    ensureAudio();\n  }, {passive:true});\n  canvas.addEventListener('pointermove', (e)=>{\n    if(!running || !touchActive || e.pointerId!==touchId) return;\n    P1.x = clamp(e.clientX + touchOffset.dx, 20, innerWidth-20);\n    P1.y = clamp(e.clientY + touchOffset.dy, 40, innerHeight-40);\n  }, {passive:true});\n  canvas.addEventListener('pointerup', (e)=>{ if(e.pointerId===touchId){ touchActive=false; touchId=null; } }, {passive:true});\n  canvas.addEventListener('pointercancel', (e)=>{ if(e.pointerId===touchId){ touchActive=false; touchId=null; } }, {passive:true});\n\n  function togglePause(){\n    paused=!paused;\n    pauseBtn.textContent = paused ? \"재개\" : \"일시정지\";\n    if(paused) sfx.warn();\n  }\n  pauseBtn.addEventListener('click', ()=>{ ensureAudio(); togglePause(); });\n  muteBtn.addEventListener('click', ()=>{ ensureAudio(); setMute(!muted); });\n  hyperBtn1.addEventListener('click', ()=>{ ensureAudio(); P1.wantHyper=true; });\n  hyperBtn2.addEventListener('click', ()=>{ ensureAudio(); if(twoPlayer) P2.wantHyper=true; });\n  howBtn.addEventListener('click', ()=>{ hint.style.display = (hint.style.display==='none') ? 'block' : 'block'; hint.style.display = (hint.style.display==='none') ? 'block' : 'none'; });\n\n  // ===== Overlay / Selection UI =====\n  function selectMode(m){\n    mode = m;\n    mode1Btn.classList.toggle(\"active\", mode===\"1p\");\n    mode2Btn.classList.toggle(\"active\", mode===\"2p\");\n  }\n\n  function shipCardHTML(s){\n    const u = (s.hyper.type===\"barrage\")?\"탄막\":(s.hyper.type===\"wide\"?\"부채꼴\":(s.hyper.type===\"beam\"?\"빔\":\"톱니 3배\"));\n    return `\n      <div class=\"shipTop\">\n        <div class=\"shipName\">${s.name}</div>\n        <span class=\"tag\">${s.tag}</span>\n      </div>\n      <div class=\"bar\" title=\"공격\"><i style=\"width:${s.bars.power}%\"></i></div>\n      <div class=\"bar\" title=\"속도\"><i style=\"width:${s.bars.speed}%\"></i></div>\n      <div class=\"bar\" title=\"조작성\"><i style=\"width:${s.bars.control}%\"></i></div>\n      <div class=\"desc\">${s.desc}</div>\n      <div class=\"meta\">\n        <span class=\"dot\">발사 ${Math.round(1/s.stats.fire*10)/10}/s</span>\n        <span class=\"dot\">공격 x${s.stats.dmgMul.toFixed(2)}</span>\n        <span class=\"dot\">궁극기: ${u} (${HYPER_DURATION_ALL}s)</span>\n      </div>\n    `;\n  }\n\n  function renderSoloGrid(){\n    soloGrid.innerHTML = \"\";\n    for(const s of SHIPS){\n      const div = document.createElement('div');\n      div.className = \"shipCard\" + (s.id===shipP1.id ? \" activeP1\" : \"\");\n      div.innerHTML = shipCardHTML(s);\n      div.addEventListener('click', ()=>{\n        shipP1 = s;\n        renderSoloGrid();\n      });\n      soloGrid.appendChild(div);\n    }\n  }\n\n  function renderDuoGrids(){\n    p1Grid.innerHTML = \"\";\n    p2Grid.innerHTML = \"\";\n    p1Chosen.textContent = shipP1.name;\n    p2Chosen.textContent = shipP2.name;\n\n    for(const s of SHIPS){\n      const c1 = document.createElement('div');\n      c1.className = \"shipCard\" + (s.id===shipP1.id ? \" activeP1\" : \"\");\n      c1.innerHTML = shipCardHTML(s);\n      c1.addEventListener('click', ()=>{\n        shipP1 = s;\n        p1Chosen.textContent = shipP1.name;\n        renderDuoGrids();\n      });\n      p1Grid.appendChild(c1);\n\n      const c2 = document.createElement('div');\n      c2.className = \"shipCard\" + (s.id===shipP2.id ? \" activeP2\" : \"\");\n      c2.innerHTML = shipCardHTML(s);\n      c2.addEventListener('click', ()=>{\n        shipP2 = s;\n        p2Chosen.textContent = shipP2.name;\n        renderDuoGrids();\n      });\n      p2Grid.appendChild(c2);\n    }\n  }\n\n  function setPickUI(stage){\n    if(stage===\"mode\"){\n      overlayTitle.textContent = \"플레이 모드 선택\";\n      overlayDesc.textContent = \"1인 또는 2인을 고른 뒤, 기체를 선택하고 시작해!\";\n      modeRow.style.display = \"flex\";\n      soloPick.style.display = \"none\";\n      duoPick.style.display = \"none\";\n      diffRow.style.display = \"none\";\n      actionRow.style.display = \"none\";\n\n      mode2Btn.disabled = !isPC;\n      mode2Btn.style.opacity = isPC ? 1 : 0.55;\n      mode1Btn.classList.toggle(\"active\", mode===\"1p\");\n      mode2Btn.classList.toggle(\"active\", mode===\"2p\");\n      return;\n    }\n\n    overlayTitle.textContent = \"기체 선택\";\n    overlayDesc.innerHTML =\n      `파워업: <b>RAPID</b>(연사) / <b>SPREAD</b>(확산) / <b>LASER</b>(강화레이저) / <b>SHIELD</b>(쉴드)<br/>\n       보스는 <b>20000점마다</b> 등장, 처치하면 <b>기체 업그레이드(메카+네온)</b>!<br/>\n       모든 기체 <b>궁극기 지속 ${HYPER_DURATION_ALL}s</b>, 보스는 <b>3패턴 로테이션</b>.`;\n\n    modeRow.style.display = \"none\";\n    diffRow.style.display = \"flex\";\n    actionRow.style.display = \"flex\";\n\n    if(mode===\"1p\"){\n      soloPick.style.display = \"block\";\n      duoPick.style.display = \"none\";\n      renderSoloGrid();\n    }else{\n      soloPick.style.display = \"none\";\n      duoPick.style.display = \"block\";\n      renderDuoGrids();\n    }\n  }\n\n  mode1Btn.addEventListener('click', ()=>{ selectMode(\"1p\"); setPickUI(\"ships\"); });\n  mode2Btn.addEventListener('click', ()=>{ if(!isPC) return; selectMode(\"2p\"); setPickUI(\"ships\"); });\n\n  backBtn.addEventListener('click', ()=> setPickUI(\"mode\"));\n\n  function reset(){\n    state.score=0; state.level=1; state.time=0;\n    state.spawnTimer=0; state.spawnEvery=0.9 * D.spawnMul; state.enemySpeed=160;\n    state.powerDropCd=0;\n    state.nextBossAt=TUNE.bossEveryScore;\n    state.bossActive=false; state.boss=null;\n    state.toastT=0;\n\n    state.bossWarnT=0;\n    state.bossQueued=false;\n\n    bullets.length=0; enemies.length=0; eBullets.length=0; drops.length=0;\n\n    bossbar.style.display=\"none\";\n    toast.style.display=\"none\";\n\n    for(const p of [P1,P2]){\n      p.cooldown=0; p.invuln=0;\n      p.powerType=null; p.powerT=0; p.shield=0;\n      p.hyper=0; p.hyperOn=false; p.hyperT=0; p.barrageCd=0;\n      p.wantFire=false; p.wantHyper=false;\n      p.gears.length = 0;\n\n      p.upgradeTier = 0;\n      p.upgradeFlash = 0;\n      p.dmgBonus = 0;\n      p.upSkin = { glowBoost:0, crownSize:0, neon:0 };\n    }\n\n    P1.x = innerWidth*0.5 - 70;\n    P1.y = innerHeight*0.78;\n    P1.lives = D.lives;\n    P1.ship = shipP1;\n    P1.fireEvery = shipP1.stats.fire;\n\n    P2.x = innerWidth*0.5 + 70;\n    P2.y = innerHeight*0.78;\n    P2.lives = D.lives;\n    P2.ship = shipP2;\n    P2.fireEvery = shipP2.stats.fire;\n\n    ensureGears(P1);\n    ensureGears(P2);\n\n    uiPlayers();\n    elScore.textContent = \"0\";\n  }\n\n  function start(){\n    D = diff[diffSel.value] || diff.normal;\n    twoPlayer = (mode===\"2p\") && isPC;\n    reset();\n    running=true;\n    paused=false;\n    overlay.style.display='none';\n    ensureAudio();\n    setMute(false);\n  }\n  startBtn.addEventListener('click', start);\n\n  function gameOver(){\n    running=false; paused=false;\n    overlay.style.display='flex';\n    setPickUI(\"mode\");\n    sfx.explode();\n  }\n\n  // ===== Logic =====\n  function updateControls(dt){\n    // P1\n    if(!touchActive){\n      let mx=0,my=0;\n      if(keys.has(\"ArrowLeft\")||keys.has(\"KeyA\")) mx-=1;\n      if(keys.has(\"ArrowRight\")||keys.has(\"KeyD\")) mx+=1;\n      if(keys.has(\"ArrowUp\")||keys.has(\"KeyW\")) my-=1;\n      if(keys.has(\"ArrowDown\")||keys.has(\"KeyS\")) my+=1;\n      const len = Math.hypot(mx,my)||1;\n      mx/=len; my/=len;\n      const sp = 360;\n      P1.x = clamp(P1.x + mx*sp*dt, 20, innerWidth-20);\n      P1.y = clamp(P1.y + my*sp*dt, 40, innerHeight-40);\n    }\n    P1.wantFire = keys.has(\"Space\") || (!isPC && touchActive);\n\n    // P2 (✅ 살짝 관성)\n    if(twoPlayer){\n      const follow = 14;\n      P2.x = lerp(P2.x, clamp(mouseX, 20, innerWidth-20), clamp(dt*follow, 0, 1));\n      P2.y = lerp(P2.y, clamp(mouseY, 40, innerHeight-40), clamp(dt*follow, 0, 1));\n      P2.wantFire = mouseDown;\n    } else {\n      P2.wantFire=false;\n    }\n  }\n\n  function spawnLogic(dt){\n    const newLevel = 1 + Math.floor(state.score / 700);\n    if(newLevel !== state.level){\n      state.level = newLevel;\n      state.spawnEvery = clamp((0.9 - state.level*0.06) * D.spawnMul, 0.32, 0.9);\n      state.enemySpeed = 160 + state.level*22;\n    }\n\n    // ✅ 보스 예고 → 소환\n    if(!state.bossActive && !state.bossQueued && state.score >= state.nextBossAt){\n      state.bossQueued = true;\n      state.bossWarnT = 1.2;\n      showToast(\"⚠ 보스 접근!\", 1.1);\n      sfx.warn();\n    }\n\n    // 예고 중: 스폰 멈춤\n    if(state.bossQueued){\n      state.spawnTimer = 0;\n      enemies.length = 0;\n      state.bossWarnT -= dt;\n      if(state.bossWarnT <= 0){\n        state.bossQueued = false;\n        spawnBoss();\n      }\n      return;\n    }\n\n    // 보스 중이면 적 생성 X\n    if(!state.bossActive){\n      state.spawnTimer += dt;\n      while(state.spawnTimer >= state.spawnEvery){\n        state.spawnTimer -= state.spawnEvery;\n        spawnEnemy();\n        if(state.level>=5 && Math.random()<0.25) spawnEnemy();\n      }\n    } else {\n      state.spawnTimer = 0;\n      enemies.length = 0;\n    }\n  }\n\n  function updateEntities(dt){\n    state.time += dt;\n    state.powerDropCd = Math.max(0, state.powerDropCd - dt);\n\n    if(state.toastT > 0){\n      state.toastT -= dt;\n      if(state.toastT <= 0) toast.style.display=\"none\";\n    }\n\n    const players = [P1, ...(twoPlayer?[P2]:[])];\n\n    for(const p of players){\n      if(p.cooldown>0) p.cooldown -= dt;\n      if(p.invuln>0) p.invuln -= dt;\n\n      if(p.upgradeFlash>0) p.upgradeFlash = Math.max(0, p.upgradeFlash - dt);\n\n      if(p.powerType){\n        p.powerT -= dt;\n        if(p.powerT <= 0) clearPower(p);\n      }\n\n      if(p.hyperOn){\n        p.hyperT -= dt;\n        if(p.hyperT <= 0){\n          p.hyperOn=false; p.hyperT=0; p.barrageCd=0;\n        }else{\n          hyperExtraFire(p, dt);\n        }\n      }\n\n      updateGears(p, dt);\n\n      if(p.wantHyper){ tryHyper(p); p.wantHyper=false; }\n      if(p.wantFire) fire(p);\n    }\n\n    for(let i=bullets.length-1;i>=0;i--){\n      const b = bullets[i];\n      b.x += (b.vx||0)*dt;\n      b.y += (b.vy||0)*dt;\n      if(b.y < -160 || b.x < -160 || b.x > innerWidth+160) bullets.splice(i,1);\n    }\n\n    for(let i=eBullets.length-1;i>=0;i--){\n      const b = eBullets[i];\n      b.x += b.vx*dt;\n      b.y += b.vy*dt;\n      if(b.y > innerHeight+200 || b.x < -200 || b.x > innerWidth+200) eBullets.splice(i,1);\n    }\n\n    for(let i=enemies.length-1;i>=0;i--){\n      const e = enemies[i];\n      e.t += dt;\n      if(e.zig) e.x += Math.sin(e.t*e.zig)*e.vx*dt*0.8;\n      e.y += e.vy*dt;\n\n      if(e.shooter){\n        e.shootCd -= dt;\n        if(e.shootCd<=0 && e.y>40 && e.y<innerHeight*0.72){\n          enemyFire(e);\n          const scale = clamp(1 + state.level*0.040, 1, 2.2);\n          e.shootCd = rand(0.90, 1.60) / scale;\n        }\n      }\n\n      if(e.y > innerHeight+90) enemies.splice(i,1);\n    }\n\n    for(let i=drops.length-1;i>=0;i--){\n      const d = drops[i];\n      d.y += d.vy*dt;\n      if(d.y > innerHeight+120) drops.splice(i,1);\n    }\n  }\n\n  function collisions(dt){\n    const players = [P1, ...(twoPlayer?[P2]:[])];\n\n    // enemy bullet -> player\n    for(const p of players){\n      if(p.invuln>0 || p.lives<=0) continue;\n      for(let i=eBullets.length-1;i>=0;i--){\n        const b = eBullets[i];\n        const rr = p.r + b.r;\n        if(dist2(p.x,p.y,b.x,b.y) <= rr*rr){\n          eBullets.splice(i,1);\n          takeDamage(p);\n          break;\n        }\n      }\n    }\n\n    // player -> enemy collision\n    for(const p of players){\n      if(p.invuln>0 || p.lives<=0) continue;\n      for(let i=enemies.length-1;i>=0;i--){\n        const e=enemies[i];\n        const rr = p.r*0.9 + e.r*0.85;\n        if(dist2(p.x,p.y,e.x,e.y) <= rr*rr){\n          enemies.splice(i,1);\n          takeDamage(p);\n          break;\n        }\n      }\n    }\n\n    // 톱니 -> enemy/boss/enemyBullets\n    for(const p of players){\n      if(!p.gears.length) continue;\n\n      const scale = gearScale(p);\n      const gr = TUNE.gearR * scale;\n\n      const baseDps = (TUNE.gearDmgBase + state.level*TUNE.gearDmgPerLevel) * (p.ship.stats.dmgMul + (p.dmgBonus||0));\n      const dps = baseDps * gearDmgMul(p);\n\n      for(const g of p.gears){\n        const pos = gearWorldPos(p, g);\n\n        // 적 데미지\n        for(let i=enemies.length-1;i>=0;i--){\n          const e = enemies[i];\n          const rr = gr + e.r*0.85;\n          if(dist2(pos.x,pos.y,e.x,e.y) <= rr*rr){\n            e.hp -= dps * dt;\n            if(e.hp <= 0){\n              const wasX=e.x, wasY=e.y;\n              enemies.splice(i,1);\n              const baseGain = 80 + state.level*6 + (e.kind===\"fast\"?20:0);\n              setScore(state.score + Math.floor(baseGain * D.scoreMul));\n              addHyper(p, 2.8);\n              sfx.explode();\n              maybeDropPower(wasX, wasY);\n            }else{\n
